<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Passeport Français — Juillet & Août</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap');

:root {
  --creme: #FBF8F2;
  --encre: #1C1C1A;
  --encre-doux: #4A4A45;
  --jul: #2D6A8A;
  --jul-light: #E8F3F9;
  --aout: #8A5A2D;
  --aout-light: #F9F0E8;
  --vert: #2A6B4A;
  --vert-light: #E8F5EE;
  --rouge: #8A2D2D;
  --rouge-light: #F9E8E8;
  --or: #B8860B;
  --or-light: #FDF8E8;
  --border: rgba(28,28,26,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--creme);
  color: var(--encre);
  min-height: 100vh;
}

/* ── ÉCRAN D'ACCUEIL ── */
#screen-home {
  max-width: 680px;
  margin: 0 auto;
  padding: 2rem 1.25rem;
}

.home-hero {
  text-align: center;
  padding: 2.5rem 0 2rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2rem;
}

.home-hero .overtitle {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--encre-doux);
  margin-bottom: 1rem;
}

.home-hero h1 {
  font-family: 'Fraunces', serif;
  font-weight: 300;
  font-size: 42px;
  line-height: 1.1;
  color: var(--encre);
  margin-bottom: 0.5rem;
}

.home-hero h1 em {
  font-style: italic;
  color: var(--jul);
}

.home-hero .sub {
  font-size: 14px;
  color: var(--encre-doux);
  margin-top: 0.75rem;
}

.month-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 2rem;
}

.month-card {
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.25rem;
  background: #fff;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.month-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }

.month-card.juillet::before {
  content: "";
  position: absolute; top: 0; right: 0;
  width: 60px; height: 60px;
  background: var(--jul-light);
  border-radius: 0 16px 0 60px;
}

.month-card.aout::before {
  content: "";
  position: absolute; top: 0; right: 0;
  width: 60px; height: 60px;
  background: var(--aout-light);
  border-radius: 0 16px 0 60px;
}

.month-label {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.juillet .month-label { color: var(--jul); }
.aout .month-label { color: var(--aout); }

.month-title {
  font-family: 'Fraunces', serif;
  font-weight: 500;
  font-size: 22px;
  margin-bottom: 4px;
}

.month-meta {
  font-size: 12px;
  color: var(--encre-doux);
  margin-bottom: 1rem;
}

.month-progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
  margin-bottom: 6px;
}

.month-progress-fill {
  height: 4px;
  border-radius: 99px;
  transition: width 0.4s;
}

.juillet .month-progress-fill { background: var(--jul); }
.aout .month-progress-fill { background: var(--aout); }

.month-days-done {
  font-size: 11px;
  color: var(--encre-doux);
}

.weeks-section { margin-bottom: 2rem; }
.weeks-section h2 {
  font-family: 'Fraunces', serif;
  font-weight: 300;
  font-size: 18px;
  margin-bottom: 1rem;
  color: var(--encre);
}

.week-list { display: flex; flex-direction: column; gap: 8px; }

.week-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.15s;
}

.week-row:hover { background: var(--creme); }
.week-row.locked { opacity: 0.45; cursor: default; }

.week-dot {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 500;
  flex-shrink: 0;
}

.week-dot.juillet { background: var(--jul-light); color: var(--jul); }
.week-dot.aout { background: var(--aout-light); color: var(--aout); }
.week-dot.done { background: var(--vert-light); color: var(--vert); }

.week-info { flex: 1; }
.week-name { font-size: 14px; font-weight: 500; }
.week-theme { font-size: 12px; color: var(--encre-doux); margin-top: 1px; }

.week-score {
  font-size: 12px;
  font-weight: 500;
  color: var(--vert);
}

.week-days {
  display: flex; gap: 3px;
}

.week-day-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--border);
}
.week-day-dot.done { background: var(--vert); }
.week-day-dot.current { background: var(--jul); }

/* ── ÉCRAN SEMAINE ── */
#screen-week {
  max-width: 680px;
  margin: 0 auto;
  padding: 1.5rem 1.25rem;
}

.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; color: var(--encre-doux);
  background: none; border: none; cursor: pointer;
  padding: 0; margin-bottom: 1.5rem;
  transition: color 0.15s;
}
.back-btn:hover { color: var(--encre); }

.week-header {
  margin-bottom: 1.5rem;
}

.week-header .eyebrow {
  font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--encre-doux); margin-bottom: 6px;
}

.week-header h2 {
  font-family: 'Fraunces', serif;
  font-weight: 300; font-size: 28px;
  margin-bottom: 4px;
}

.week-header .theme-pill {
  display: inline-block;
  font-size: 12px; padding: 4px 12px;
  border-radius: 99px; border: 1px solid var(--border);
  color: var(--encre-doux);
}

.days-grid {
  display: flex; flex-direction: column; gap: 8px;
}

.day-row {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.day-row:hover { transform: translateX(3px); }
.day-row.done { border-color: var(--vert); background: var(--vert-light); }
.day-row.locked { opacity: 0.4; cursor: default; }

.day-num {
  font-family: 'Fraunces', serif;
  font-size: 20px; font-weight: 300;
  min-width: 32px; color: var(--encre-doux);
}

.day-info { flex: 1; }
.day-title { font-size: 14px; font-weight: 500; }
.day-blocks { font-size: 12px; color: var(--encre-doux); margin-top: 2px; }

.day-status {
  font-size: 12px; font-weight: 500;
}
.day-row.done .day-status { color: var(--vert); }

/* ── ÉCRAN LEÇON ── */
#screen-lesson {
  max-width: 680px;
  margin: 0 auto;
  padding: 1.5rem 1.25rem;
}

.lesson-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1.5rem;
}

.lesson-meta { font-size: 12px; color: var(--encre-doux); }

.step-indicators {
  display: flex; gap: 6px;
}

.step-dot {
  width: 24px; height: 4px;
  border-radius: 99px;
  background: var(--border);
  transition: background 0.3s;
}
.step-dot.active { background: var(--jul); }
.step-dot.done-step { background: var(--vert); }

/* Bloc leçon */
.lesson-block {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
  margin-bottom: 1rem;
}

.block-tag {
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  font-weight: 500; margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}

.block-tag .tag-dot {
  width: 6px; height: 6px; border-radius: 50%;
}

.tag-lecon .tag-dot { background: var(--jul); }
.tag-lecon { color: var(--jul); }
.tag-exercice .tag-dot { background: var(--or); }
.tag-exercice { color: var(--or); }
.tag-defi .tag-dot { background: var(--vert); }
.tag-defi { color: var(--vert); }

.lesson-title {
  font-family: 'Fraunces', serif;
  font-weight: 500; font-size: 20px;
  margin-bottom: 1rem; line-height: 1.3;
}

.lesson-rule {
  background: var(--jul-light);
  border-left: 3px solid var(--jul);
  border-radius: 0 8px 8px 0;
  padding: 10px 14px;
  font-size: 14px; line-height: 1.6;
  margin-bottom: 1rem;
}

.lesson-examples {
  display: flex; flex-direction: column; gap: 6px;
  margin-bottom: 1rem;
}

.example-item {
  font-size: 14px; line-height: 1.5;
  padding: 8px 12px;
  background: var(--creme);
  border-radius: 8px;
}

.example-item strong { color: var(--jul); }

/* Exercices */
.exo-list { display: flex; flex-direction: column; gap: 14px; }

.exo-item { }

.exo-q {
  font-size: 14px; line-height: 1.5;
  margin-bottom: 8px;
}

.exo-opts { display: flex; flex-direction: column; gap: 6px; }

.exo-opt {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  background: #fff;
  transition: all 0.15s;
}
.exo-opt:hover { background: var(--creme); }
.exo-opt.selected { border-color: var(--jul); background: var(--jul-light); color: var(--jul); }
.exo-opt.correct { border-color: var(--vert); background: var(--vert-light); color: var(--vert); }
.exo-opt.wrong { border-color: var(--rouge); background: var(--rouge-light); color: var(--rouge); }

.opt-letter { font-weight: 500; min-width: 16px; font-size: 12px; }

.exo-blank input {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 14px;
  font-family: inherit;
  width: 100%;
  background: #fff;
  color: var(--encre);
  outline: none;
  transition: border-color 0.15s;
}
.exo-blank input:focus { border-color: var(--jul); }
.exo-blank input.correct { border-color: var(--vert); background: var(--vert-light); }
.exo-blank input.wrong { border-color: var(--rouge); background: var(--rouge-light); }

.check-btn {
  margin-top: 8px;
  padding: 7px 16px;
  border: 1px solid var(--jul);
  border-radius: 8px;
  background: transparent;
  color: var(--jul);
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}
.check-btn:hover { background: var(--jul); color: #fff; }
.check-btn:disabled { opacity: 0.4; cursor: default; }

.exo-feedback {
  font-size: 12px;
  margin-top: 6px;
  padding: 6px 10px;
  border-radius: 6px;
  display: none;
}
.exo-feedback.show { display: block; }
.exo-feedback.ok { background: var(--vert-light); color: var(--vert); }
.exo-feedback.ko { background: var(--rouge-light); color: var(--rouge); }

/* Défi */
.defi-zone {
  min-height: 90px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 14px;
  font-family: inherit;
  line-height: 1.6;
  background: #fff;
  color: var(--encre);
  resize: none;
  width: 100%;
  outline: none;
  transition: border-color 0.15s;
}
.defi-zone:focus { border-color: var(--vert); }

.defi-hint {
  font-size: 12px;
  color: var(--encre-doux);
  margin-bottom: 10px;
  padding: 8px 12px;
  background: var(--or-light);
  border-radius: 8px;
  border-left: 3px solid var(--or);
}

/* Navigation bas */
.lesson-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 1.5rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
}

.btn-nav {
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--encre);
}
.btn-nav:hover { background: var(--creme); }
.btn-nav.primary {
  background: var(--encre);
  color: var(--creme);
  border-color: var(--encre);
}
.btn-nav.primary:hover { background: #333; }
.btn-nav.success {
  background: var(--vert);
  color: #fff;
  border-color: var(--vert);
}

.score-display {
  font-size: 13px;
  color: var(--encre-doux);
}

/* ── RÉSULTAT JOURNÉE ── */
.result-day {
  text-align: center;
  padding: 2rem 1rem;
}

.result-day .big-emoji {
  font-size: 48px;
  margin-bottom: 1rem;
}

.result-day h3 {
  font-family: 'Fraunces', serif;
  font-weight: 300;
  font-size: 26px;
  margin-bottom: 0.5rem;
}

.result-day .result-score {
  font-size: 36px;
  font-weight: 500;
  margin: 1rem 0;
}

.result-day .score-detail {
  font-size: 13px;
  color: var(--encre-doux);
  margin-bottom: 1.5rem;
}

.stars { font-size: 24px; letter-spacing: 4px; }

.hidden { display: none; }
</style>
</head>
<body>

<!-- ══ ÉCRAN ACCUEIL ══ -->
<div id="screen-home">
  <div class="home-hero">
    <div class="overtitle">Passeport langue française</div>
    <h1>Juillet &amp; <em>Août</em></h1>
    <p class="sub">30 minutes par jour · 62 jours · Niveaux A2 → B1</p>
  </div>

  <div class="month-grid">
    <div class="month-card juillet" onclick="showMonth('juillet')">
      <div class="month-label">Juillet</div>
      <div class="month-title">Bases &amp; fluidité</div>
      <div class="month-meta">31 jours · Niveau A2</div>
      <div class="month-progress-bar"><div class="month-progress-fill" id="prog-juillet" style="width:0%"></div></div>
      <div class="month-days-done" id="done-juillet">0 / 31 jours</div>
    </div>
    <div class="month-card aout" onclick="showMonth('aout')">
      <div class="month-label">Août</div>
      <div class="month-title">Nuances &amp; style</div>
      <div class="month-meta">31 jours · Niveaux A2/B1</div>
      <div class="month-progress-bar"><div class="month-progress-fill" id="prog-aout" style="width:0%"></div></div>
      <div class="month-days-done" id="done-aout">0 / 31 jours</div>
    </div>
  </div>

  <div class="weeks-section">
    <h2>Toutes les semaines</h2>
    <div class="week-list" id="all-weeks-list"></div>
  </div>
</div>

<!-- ══ ÉCRAN SEMAINE ══ -->
<div id="screen-week" class="hidden">
  <button class="back-btn" onclick="showHome()">← Retour</button>
  <div class="week-header">
    <div class="eyebrow" id="w-eyebrow"></div>
    <h2 id="w-title"></h2>
    <span class="theme-pill" id="w-theme"></span>
  </div>
  <div class="days-grid" id="days-grid"></div>
</div>

<!-- ══ ÉCRAN LEÇON ══ -->
<div id="screen-lesson" class="hidden">
  <div class="lesson-header">
    <button class="back-btn" onclick="showWeek(currentWeek)" style="margin-bottom:0">← Semaine</button>
    <div class="lesson-meta" id="lesson-meta"></div>
  </div>
  <div class="step-indicators" id="step-indicators"></div>
  <div id="lesson-content" style="margin-top:1.25rem;"></div>
</div>

<script>
/* ══════════════════════════════════════════════
   DONNÉES — 62 jours, 9 semaines juillet + 9 semaines août (≈)
══════════════════════════════════════════════ */

const CURRICULUM = [
// ── JUILLET ──
{
  id:"J1", month:"juillet", num:1,
  title:"La vie quotidienne", theme:"Thème : Les habitudes",
  days:[
    {
      id:"J1D1", title:"Les articles (le, la, les, un, une)",
      lesson:{
        titre:"Les articles en français",
        regle:"En français, chaque nom a un genre : masculin ou féminin. Les articles changent selon le genre et le nombre.",
        points:[
          "le / un → masculin singulier : <strong>le</strong> chat, <strong>un</strong> livre",
          "la / une → féminin singulier : <strong>la</strong> maison, <strong>une</strong> fleur",
          "les / des → pluriel : <strong>les</strong> enfants, <strong>des</strong> amis"
        ]
      },
      exos:[
        {type:"qcm", q:"Complète : '_____ soleil brille aujourd'hui.'", opts:["Le","La","Les","Des"], ans:0, exp:"'Soleil' est masculin → Le soleil."},
        {type:"qcm", q:"Complète : 'J'ai mangé _____ pomme.'", opts:["une","un","le","la"], ans:0, exp:"'Pomme' est féminin → une pomme."},
        {type:"qcm", q:"Complète : '_____ enfants jouent dans le parc.'", opts:["Les","Le","La","Des"], ans:0, exp:"'Enfants' est pluriel + défini → Les enfants."},
        {type:"blank", q:"Écris l'article correct : _____ livre (masculin)", ans:"le", exp:"'Livre' est masculin → le livre."},
        {type:"blank", q:"Écris l'article correct : _____ école (féminin)", ans:"l'", exp:"'École' commence par une voyelle → l'école."}
      ],
      defi:{
        consigne:"Regarde autour de toi. Écris 3 phrases avec des objets que tu vois. Utilise 'le', 'la', 'les', 'un' ou 'une'.",
        exemple:"Exemple : Il y a une table dans la cuisine. Le stylo est rouge."
      }
    },
    {
      id:"J1D2", title:"Les verbes en -ER au présent",
      lesson:{
        titre:"Conjuguer les verbes en -ER",
        regle:"La majorité des verbes français se terminent en -ER. Pour les conjuguer, on enlève -ER et on ajoute les terminaisons.",
        points:[
          "Je parle / Tu parles / Il-Elle parle",
          "Nous parlons / Vous parlez / Ils-Elles parlent",
          "Attention : je, tu, il, ils ont souvent la même prononciation !"
        ]
      },
      exos:[
        {type:"qcm", q:"'Tu _____ (aimer) le chocolat ?'", opts:["aimes","aime","aimez","aimons"], ans:0, exp:"Avec 'tu' → terminaison -es : tu aimes."},
        {type:"qcm", q:"'Nous _____ (regarder) un film.'", opts:["regardons","regardez","regardent","regarde"], ans:0, exp:"Avec 'nous' → terminaison -ons : nous regardons."},
        {type:"qcm", q:"'Ils _____ (travailler) beaucoup.'", opts:["travaillent","travaille","travaillons","travaillez"], ans:0, exp:"Avec 'ils' → terminaison -ent : ils travaillent."},
        {type:"blank", q:"'Elle _____ (chanter) très bien.'", ans:"chante", exp:"Avec 'elle' → terminaison -e : elle chante."},
        {type:"blank", q:"'Vous _____ (habiter) à Paris ?'", ans:"habitez", exp:"Avec 'vous' → terminaison -ez : vous habitez."}
      ],
      defi:{
        consigne:"Écris 3 phrases sur ce que tu fais aujourd'hui. Utilise 3 verbes en -ER différents.",
        exemple:"Exemple : Je mange des céréales le matin. Je regarde la télé le soir."
      }
    },
    {
      id:"J1D3", title:"Vocabulaire : la maison",
      lesson:{
        titre:"Les pièces et les meubles",
        regle:"Pour parler de ta maison, il faut connaître le vocabulaire des pièces et des objets courants.",
        points:[
          "Les pièces : la cuisine, le salon, la chambre, la salle de bain, les toilettes",
          "Les meubles : le canapé, la table, le lit, l'armoire, la chaise",
          "Utile : 'il y a' = there is/are → Il y a un canapé dans le salon."
        ]
      },
      exos:[
        {type:"qcm", q:"Où dort-on généralement ?", opts:["Dans la chambre","Dans la cuisine","Dans le salon","Dans la salle de bain"], ans:0, exp:"On dort dans la chambre. C'est la pièce avec le lit."},
        {type:"qcm", q:"Quel meuble est dans la cuisine ?", opts:["La cuisinière","Le canapé","Le lit","L'armoire"], ans:0, exp:"La cuisinière (ou la gazinière) est dans la cuisine pour cuisiner."},
        {type:"qcm", q:"Complète : 'Il y a _____ chaises autour de la table.'", opts:["des","de la","du","une"], ans:0, exp:"'Chaises' est pluriel indéfini → des chaises."},
        {type:"blank", q:"La pièce où on mange s'appelle la salle à _____.", ans:"manger", exp:"La salle à manger est la pièce réservée aux repas."},
        {type:"blank", q:"On prend une douche dans la salle de _____.", ans:"bain", exp:"La salle de bain contient la douche et/ou la baignoire."}
      ],
      defi:{
        consigne:"Décris ta pièce préférée à la maison. Qu'est-ce qu'il y a ? Pourquoi tu l'aimes ?",
        exemple:"Exemple : Ma pièce préférée est le salon. Il y a un grand canapé et une télévision."
      }
    },
    {
      id:"J1D4", title:"Poser des questions simples",
      lesson:{
        titre:"Les questions en français",
        regle:"Il y a trois façons de poser une question en français. En A2, on utilise surtout la première et la deuxième.",
        points:[
          "1. Intonation : 'Tu viens ?' (voix qui monte)",
          "2. Est-ce que : 'Est-ce que tu viens ?'",
          "3. Inversion : 'Viens-tu ?' (plus formel)"
        ]
      },
      exos:[

        {type:"qcm", q:"Comment demander l'heure poliment ?", opts:["Quelle heure est-il ?","Heure est quelle ?","Il est quelle heure que ?","Est-ce que heure ?"], ans:0, exp:"'Quelle heure est-il ?' est la formule correcte et naturelle."},
        {type:"qcm", q:"'_____ tu t'appelles ?' (prénom)", opts:["Comment","Pourquoi","Quand","Combien"], ans:0, exp:"Pour demander le prénom/nom → Comment tu t'appelles ?"},
        {type:"blank", q:"_____ est-ce que tu habites ? (lieu)", ans:"Où", exp:"'Où' est le mot interrogatif pour demander un lieu."},
        {type:"blank", q:"_____ est-ce que tu travailles ? (moment)", ans:"Quand", exp:"'Quand' est le mot interrogatif pour demander un moment."}
      ],
      defi:{
        consigne:"Imagine que tu rencontres quelqu'un de nouveau. Écris 4 questions pour le/la connaître.",
        exemple:"Exemple : Comment tu t'appelles ? Où est-ce que tu habites ?"
      }
    },
    {
      id:"J1D5", title:"La négation : ne...pas",
      lesson:{
        titre:"Dire non en français",
        regle:"Pour mettre une phrase à la forme négative, on utilise 'ne...pas' autour du verbe. Attention : dans le langage parlé, on oublie souvent le 'ne'.",
        points:[
          "Affirmatif : Je mange de la viande.",
          "Négatif : Je <strong>ne</strong> mange <strong>pas</strong> de viande.",
          "Avec une voyelle : Je <strong>n'</strong>aime <strong>pas</strong> le café.",
          "À l'oral : 'Je mange pas' est compris mais incorrect à l'écrit."
        ]
      },
      exos:[
        {type:"qcm", q:"Mets à la négative : 'Il parle anglais.'", opts:["Il ne parle pas anglais.","Il parle pas anglais.","Il ne parle anglais pas.","Pas il parle anglais."], ans:0, exp:"Ne se place avant le verbe, pas après → Il ne parle pas anglais."},
        {type:"qcm", q:"Complète : 'Elle _____ pas faim.'", opts:["n'a","ne a","na","n'est"], ans:0, exp:"Avant 'a' (voyelle) → 'n'' : elle n'a pas faim."},
        {type:"qcm", q:"Corrige : 'Je ne veux pas du café.'", opts:["Je ne veux pas de café.","Je ne veux pas du café.","Je veux pas de café.","Je ne veux du café pas."], ans:0, exp:"Après une négation, 'du/de la/des' devient 'de' → pas de café."},
        {type:"blank", q:"'Tu aimes le sport ?' → 'Non, je _____ aime _____ le sport.'", ans:"n' / pas", exp:"Avec une voyelle : je n'aime pas. La voyelle de 'aime' déclenche l'élision."},
        {type:"blank", q:"'Ils ont un chien.' → 'Ils _____ ont _____ de chien.'", ans:"n' / pas", exp:"Après la négation, 'un/une/des' devient 'de' → pas de chien."}
      ],
      defi:{
        consigne:"Écris 3 choses que tu ne fais pas et explique pourquoi.",
        exemple:"Exemple : Je ne mange pas de viande parce que je suis végétarien(ne)."
      }
    },
    {
      id:"J1D6", title:"Les chiffres et les quantités",
      lesson:{
        titre:"Compter et mesurer",
        regle:"Les chiffres en français peuvent être délicats, surtout 70, 80 et 90. On dit soixante-dix (60+10), quatre-vingts (4×20), quatre-vingt-dix (4×20+10).",
        points:[
          "20 = vingt / 30 = trente / 40 = quarante / 50 = cinquante",
          "60 = soixante / 70 = soixante-dix / 80 = quatre-vingts / 90 = quatre-vingt-dix",
          "Quantités : un peu de, beaucoup de, assez de, trop de"

      },
      exos:[
        {type:"qcm", q:"Comment dit-on '75' en français ?", opts:["Soixante-quinze","Septante-cinq","Soixante-et-cinq","Septante et cinq"], ans:0, exp:"En France : 75 = soixante (60) + quinze (15) = soixante-quinze."},
        {type:"qcm", q:"Complète : 'Il y a _____ sucre dans ce gâteau.' (trop)", opts:["trop de","trop du","beaucoup le","assez de"], ans:0, exp:"Après les expressions de quantité, on utilise 'de' sans article → trop de sucre."},
        {type:"qcm", q:"Combien font 4 × 20 ?", opts:["80","40","60","90"], ans:0, exp:"Quatre-vingts = 4 × 20 = 80. Le 's' disparaît quand suivi d'un autre chiffre."},
        {type:"blank", q:"Comment dit-on 91 ? Quatre-vingt-_____", ans:"onze", exp:"91 = quatre-vingts + onze = quatre-vingt-onze."},
        {type:"blank", q:"'Je bois _____ café.' (peu) → Je bois _____ peu de café.", ans:"un", exp:"'Un peu de' est l'expression pour une petite quantité indéfinie."}
      ],
      defi:{
        consigne:"Écris ton numéro de téléphone en lettres ! Et donne 2 prix de choses que tu as achetées récemment.",
        exemple:"Exemple : Mon numéro est le zéro-six-trente-deux... / J'ai acheté du pain pour un euro vingt."
      }
    },
    {
      id:"J1D7", title:"Révision semaine 1 — Bilan",
      lesson:{
        titre:"Bilan de la semaine 1",
        regle:"Cette semaine, tu as appris : les articles, les verbes en -ER, le vocabulaire de la maison, poser des questions, la négation, et les chiffres. Voici un résumé rapide.",
        points:[
          "Articles : le/la/les (défini) — un/une/des (indéfini)",
          "Verbes -ER : parle, parles, parle, parlons, parlez, parlent",

        ]
      },
      exos:[

        {type:"qcm", q:"Conjuguez : 'Vous _____ (écouter) de la musique ?'", opts:["écoutez","écoutent","écoutons","écoute"], ans:0, exp:"Avec 'vous' → terminaison -ez : vous écoutez."},
        {type:"qcm", q:"Transforme à la négative : 'J'ai du temps.'", opts:["Je n'ai pas de temps.","Je n'ai pas du temps.","Je ai pas de temps.","Je n'ai pas le temps."], ans:0, exp:"Après la négation : 'du' devient 'de' → pas de temps."},
        {type:"blank", q:"Comment dit-on 82 ? ___________________", ans:"quatre-vingt-deux", exp:"82 = quatre-vingts + deux. Sans 's' à 'vingt' car suivi d'un chiffre."},
        {type:"blank", q:"'_____ heure est-il ?' = Quelle heure est-il ?", ans:"Quelle", exp:"'Quelle' est le mot interrogatif pour l'heure (féminin → quelle)."}

      defi:{

      }

  ]

{
  id:"J2", month:"juillet", num:2,
  title:"Voyages et déplacements", theme:"Thème : Se déplacer",
  days:[
    {id:"J2D1", title:"Les transports", lesson:{titre:"Prendre les transports",regle:"Pour parler des transports, on utilise différentes prépositions selon le moyen de transport.",points:["En voiture, en bus, en métro, en avion, en train","À vélo, à pied, à moto","Je prends le bus / Je vais à pied / Je voyage en avion"]},exos:[{type:"qcm",q:"Comment dit-on qu'on va au travail à vélo ?",opts:["Je vais au travail à vélo.","Je vais au travail en vélo.","Je prends le vélo au travail.","Je marche en vélo."],ans:0,exp:"Avec 'vélo', on dit 'à vélo' (pas 'en vélo')."},
    {type:"qcm",q:"'Je _____ le métro chaque matin.'",opts:["prends","prend","prendre","prenons"],ans:0,exp:"'Je' + prendre → je prends. Verbe irrégulier important."},
    {type:"qcm",q:"Quel transport est 'en avion' ?",opts:["L'avion","La voiture","Le bus","Le bateau"],ans:0,exp:"'En avion' = voyager par avion. Les grands transports utilisent 'en'."},
    {type:"blank",q:"Je voyage _____ train pour aller à Paris.",ans:"en",exp:"On dit 'en train' pour ce moyen de transport."},
    {type:"blank",q:"Il va à l'école _____ pied tous les jours.",ans:"à",exp:"'À pied' signifie qu'on marche. On utilise 'à' et non 'en'."}],defi:{consigne:"Décris comment tu te déplaces dans ta vie quotidienne. Quels transports utilises-tu ?",exemple:"Exemple : Je vais au travail en bus. Le weekend, je me promène à pied."}},
    {id:"J2D2", title:"Demander son chemin", lesson:{titre:"S'orienter dans la ville",regle:"Pour demander et donner un chemin, il faut connaître les directions et les lieux.",points:["Tournez à gauche / à droite","Allez tout droit / Continuez","Traversez la rue / Prenez la première rue","C'est à 5 minutes à pied / C'est loin ?"]},exos:[{type:"qcm",q:"'Pour aller à la gare, _____ à gauche au feu.'",opts:["tournez","tourner","vous tournez","tournez-vous"],ans:0,exp:"Pour donner une instruction/direction, on utilise l'impératif → tournez."},
    {type:"qcm",q:"Que signifie 'tout droit' ?",opts:["Sans tourner, dans la même direction","À gauche","À droite","Derrière vous"],ans:0,exp:"'Tout droit' = continuer dans la même direction, sans tourner."},
    {type:"qcm",q:"'C'est _____ ?' Vous voulez savoir si c'est proche.",opts:["loin","ici","là","proche"],ans:0,exp:"'C'est loin ?' permet de savoir si la distance est grande ou petite."},
    {type:"blank",q:"La banque est en face _____ la pharmacie.",ans:"de",exp:"'En face de' est l'expression correcte pour indiquer une position opposée."},
    {type:"blank",q:"Prenez la _____ rue à droite.",ans:"première",exp:"'La première rue à droite' = la prochaine rue à droite."}],defi:{consigne:"Écris les directions pour aller de ton domicile à un endroit que tu connais bien.",exemple:"Exemple : Pour aller à la boulangerie : sortez de chez moi, tournez à gauche..."}},
    {id:"J2D3", title:"Réserver un billet", lesson:{titre:"Acheter et réserver",regle:"Pour acheter un billet ou réserver, il faut des expressions spécifiques.",points:["Je voudrais un billet pour... (aller simple ou aller-retour)","Un billet de première/deuxième classe","Le train part à... et arrive à...","Combien ça coûte ? / C'est quel prix ?"]},exos:[{type:"qcm",q:"Comment demander poliment un billet ?",opts:["Je voudrais un billet, s'il vous plaît.","Donne-moi un billet.","Je veux billet.","Un billet moi."],ans:0,exp:"'Je voudrais' est le conditionnel de 'vouloir' → très poli et naturel."},
    {type:"qcm",q:"'Un aller-retour' signifie :",opts:["Un billet pour aller et revenir","Un billet seulement pour aller","Deux billets","Un voyage en retard"],ans:0,exp:"Un aller-retour = ticket pour aller ET pour le retour (deux trajets)."},
    {type:"qcm",q:"'Le train _____ à 14h30.'",opts:["part","pars","partez","partir"],ans:0,exp:"'Le train' est à la 3e personne du singulier → il part."},
    {type:"blank",q:"Je voudrais un billet _____ simple pour Lyon.",ans:"aller",exp:"'Un aller simple' = seulement le trajet aller, sans retour."},
    {type:"blank",q:"C'est _____ prix, ce billet ? (pour demander le prix)",ans:"quel",exp:"'C'est quel prix ?' ou 'Quel est le prix ?' pour demander combien ça coûte."}],defi:{consigne:"Tu veux voyager de ta ville à Paris. Écris ce que tu dirais au guichet de la gare.",exemple:"Exemple : Bonjour, je voudrais un aller-retour pour Paris, s'il vous plaît."}},
    {id:"J2D4", title:"À l'hôtel", lesson:{titre:"Réserver un hôtel",regle:"Quand on voyage, on a besoin de réserver une chambre et de comprendre les informations de l'hôtel.",points:["Je voudrais réserver une chambre pour 2 personnes.","Pour combien de nuits ? Pour 3 nuits, du 5 au 8 juillet.","La chambre est-elle avec petit-déjeuner inclus ?","À quelle heure est le check-in / check-out ?"]},exos:[{type:"qcm",q:"'Je voudrais une chambre _____ deux personnes.'",opts:["pour","à","avec","de"],ans:0,exp:"'Pour' indique la destination ou la personne : une chambre pour deux personnes."},
    {type:"qcm",q:"'Check-out' signifie :",opts:["L'heure de départ de l'hôtel","L'heure d'arrivée","Le petit-déjeuner","La réservation"],ans:0,exp:"Le check-out = l'heure à laquelle on doit libérer la chambre et partir."},
    {type:"qcm",q:"'Le petit-déjeuner est _____.' (compris dans le prix)",opts:["inclus","incluse","inclut","include"],ans:0,exp:"'Inclus' (masculin) = compris dans le prix. Au féminin : incluse."},
    {type:"blank",q:"La chambre est disponible _____ 15h. (à partir de)",ans:"à partir de",exp:"'À partir de 15h' = depuis 15h, pas avant 15h."},
    {type:"blank",q:"C'est combien _____ nuit ?",ans:"par",exp:"'Par nuit' indique le prix pour chaque nuit → 80 euros par nuit."}],defi:{consigne:"Écris un message pour réserver une chambre d'hôtel pour 2 nuits. Précise tes besoins.",exemple:"Exemple : Bonjour, je voudrais réserver une chambre pour 2 personnes..."}},
    {id:"J2D5", title:"Les pays et les nationalités", lesson:{titre:"Parler des pays",regle:"En français, on utilise des prépositions différentes selon les pays (masculin, féminin, pluriel).",points:["EN + pays féminin : en France, en Espagne, en Italie","AU + pays masculin : au Maroc, au Japon, au Canada","AUX + pays pluriel : aux États-Unis, aux Pays-Bas","Nationalités : je suis français(e), marocain(e), espagnol(e)"]},exos:[{type:"qcm",q:"'Je vais _____ Maroc cet été.'",opts:["au","en","à","aux"],ans:0,exp:"'Maroc' est masculin → au Maroc. (En + féminin / Au + masculin)"},
    {type:"qcm",q:"'Elle vient _____ États-Unis.'",opts:["des","du","de","d'"],ans:0,exp:"Pour les pays pluriels, on utilise 'des' → des États-Unis."},
    {type:"qcm",q:"Il est né en Italie. Quelle est sa nationalité ?",opts:["Il est italien.","Il est italienne.","Il est italie.","Il est de Italie."],ans:0,exp:"Nationalité masculine → italien (sans -ne pour les hommes)."},
    {type:"blank",q:"J'habite _____ France depuis 5 ans.",ans:"en",exp:"'France' est féminin → en France."},
    {type:"blank",q:"Elle vient _____ Japon. (origine)",ans:"du",exp:"Pour indiquer l'origine d'un pays masculin, on dit 'du' → elle vient du Japon."}],defi:{consigne:"Parle d'un voyage que tu as fait ou que tu rêves de faire. Quel pays ? Pourquoi ?",exemple:"Exemple : Je voudrais aller au Japon parce que j'aime la culture japonaise."}},
    {id:"J2D6", title:"Parler du passé (passé composé)", lesson:{titre:"Le passé composé",regle:"Pour parler d'actions terminées dans le passé, on utilise le passé composé : AVOIR/ÊTRE + participe passé.",points:["J'ai mangé / Tu as dormi / Nous avons regardé → avec AVOIR",
    "Je suis allé(e) / Elle est venue / Ils sont partis → avec ÊTRE",
    "Astuce : les verbes de mouvement utilisent souvent ÊTRE (aller, venir, partir, arriver...)"]},exos:[{type:"qcm",q:"'Elle _____ allée au marché ce matin.'",opts:["est","a","était","avait"],ans:0,exp:"'Aller' utilise 'être' au passé composé → elle est allée (accord avec sujet féminin)."},
    {type:"qcm",q:"'Nous _____ regardé un film hier soir.'",opts:["avons","sommes","avez","ont"],ans:0,exp:"'Regarder' utilise 'avoir' → nous avons regardé."},
    {type:"qcm",q:"Quel est le participe passé de 'finir' ?",opts:["fini","finit","finis","finir"],ans:0,exp:"Verbes en -IR → participe passé en -i : finir → fini."},
    {type:"blank",q:"J'_____ travaillé toute la journée.",ans:"ai",exp:"'Travailler' utilise 'avoir' → j'ai travaillé."},
    {type:"blank",q:"Ils _____ partis tôt ce matin.",ans:"sont",exp:"'Partir' utilise 'être' → ils sont partis (accord au masculin pluriel)."}],defi:{consigne:"Raconte ce que tu as fait hier. Utilise au moins 4 verbes au passé composé.",exemple:"Exemple : Hier, j'ai mangé avec ma famille. Nous sommes allés au parc."}},
    {id:"J2D7", title:"Révision semaine 2 — Voyages", lesson:{titre:"Bilan semaine 2",regle:"Cette semaine : les transports, demander son chemin, réserver, les pays et nationalités, et le passé composé. Un rappel essentiel :",points:["Transports : en voiture / à vélo / à pied","Directions : tournez à gauche, allez tout droit","Passé composé : avoir/être + participe passé","Pays : en + féminin / au + masculin / aux + pluriel"]},exos:[{type:"qcm",q:"'Je suis _____ à Paris hier à 18h.' (arriver)",opts:["arrivé","arrivée","arriver","arrivés"],ans:0,exp:"'Arriver' utilise être. Sujet masculin singulier → arrivé."},
    {type:"qcm",q:"'Pour aller à la gare, _____ tout droit.'",opts:["allez","aller","vous allez","allons"],ans:0,exp:"Pour donner une direction, on utilise l'impératif → allez."},
    {type:"qcm",q:"Comment dit-on 'Spain' en français ?",opts:["L'Espagne","L'Españe","L'Espagn","L'Ispagne"],ans:0,exp:"Spain = l'Espagne. C'est un pays féminin → en Espagne."},
    {type:"blank",q:"Je voudrais un aller _____ pour Marseille, s'il vous plaît.",ans:"simple",exp:"Un aller simple = seulement le trajet aller (pas de retour)."},
    {type:"blank",q:"Hier soir, nous _____ regardé les étoiles.",ans:"avons",exp:"'Regarder' utilise l'auxiliaire 'avoir' → nous avons regardé."}],defi:{consigne:"Raconte un voyage imaginaire : où tu es allé(e), comment tu y es allé(e), et ce que tu as fait.",exemple:"Exemple : Le weekend dernier, je suis allé(e) à Rome en avion. J'ai visité le Colisée..."}}
  ]
},
{
  id:"J3", month:"juillet", num:3,
  title:"Manger et cuisiner", theme:"Thème : La nourriture",
  days:[
    {id:"J3D1", title:"Les aliments et les repas", lesson:{titre:"Le vocabulaire de la nourriture",regle:"En France, il y a traditionnellement 3 repas : le petit-déjeuner, le déjeuner et le dîner. Voici les mots essentiels.",points:["Petit-déjeuner : café, thé, croissant, pain, beurre, confiture, jus d'orange","Déjeuner/Dîner : la viande, le poisson, les légumes, le riz, les pâtes, la salade","Dessert : le gâteau, la tarte, la crème, les fruits"]},exos:[{type:"qcm",q:"Quel est le repas du matin en français ?",opts:["Le petit-déjeuner","Le déjeuner","Le dîner","Le goûter"],ans:0,exp:"Le petit-déjeuner = breakfast. Le déjeuner = lunch. Le dîner = dinner."},
    {type:"qcm",q:"'Je mange des _____ avec de la sauce tomate.' (pâtes)",opts:["pâtes","pâte","path","paste"],ans:0,exp:"Les pâtes (toujours au pluriel en français) = pasta."},
    {type:"qcm",q:"Quel aliment n'est pas un légume ?",opts:["La fraise","La carotte","Le poireau","L'aubergine"],ans:0,exp:"La fraise est un fruit. Les carottes, poireaux et aubergines sont des légumes."},
    {type:"blank",q:"Le _____ est le repas du midi.",ans:"déjeuner",exp:"Le déjeuner = le repas de midi, entre le petit-déjeuner et le dîner."},
    {type:"blank",q:"Je mets du _____ sur mon pain le matin. (butter)",ans:"beurre",exp:"Le beurre = butter. On le met souvent sur le pain au petit-déjeuner."}],defi:{consigne:"Décris ce que tu manges habituellement dans une journée. Petit-déjeuner, déjeuner, dîner.",exemple:"Exemple : Le matin, je mange du pain avec du beurre et je bois un café."}},
    {id:"J3D2", title:"Au restaurant", lesson:{titre:"Commander au restaurant",regle:"Au restaurant français, il y a un vocabulaire spécifique pour commander et interagir avec le serveur.",points:["'La carte / le menu, s'il vous plaît !'","'Vous avez choisi ?' → 'Je voudrais... / Je vais prendre...'","'L'addition, s'il vous plaît.' pour payer","'C'est bon !' / 'C'était délicieux !'"]},exos:[{type:"qcm",q:"Comment demander l'addition au restaurant ?",opts:["L'addition, s'il vous plaît.","Le prix, s'il vous plaît.","Je veux payer maintenant.","Combien je dois ?"],ans:0,exp:"'L'addition' est le mot français pour 'bill'. On dit 'L'addition, s'il vous plaît'."},
    {type:"qcm",q:"'Vous avez _____?' → le serveur demande si vous êtes prêt(e).",opts:["choisi","choisir","choisit","le choix"],ans:0,exp:"Le serveur dit 'Vous avez choisi ?' = Have you chosen? Participé passé de choisir."},
    {type:"qcm",q:"'Je vais _____ le steak-frites.'",opts:["prendre","pris","prends","prenons"],ans:0,exp:"'Je vais prendre' = forme naturelle pour commander (infinitif après 'vais')."},
    {type:"blank",q:"La carte, c'est la liste des _____ du restaurant.",ans:"plats",exp:"La carte / le menu = la liste des plats (dishes) proposés."},
    {type:"blank",q:"'C'était _____!' pour dire que c'était très bon.",ans:"délicieux",exp:"'Délicieux' (ou délicieuse au féminin) = delicious. Très utilisé pour complimenter."}],defi:{consigne:"Écris un dialogue au restaurant entre un serveur et un client. 6-8 lignes minimum.",exemple:"Exemple : Serveur : Bonjour, vous avez choisi ? Client : Oui, je voudrais le poulet rôti..."}},
    {id:"J3D3", title:"Les articles partitifs", lesson:{titre:"Du, de la, des — les articles partitifs",regle:"Les articles partitifs s'utilisent pour parler d'une quantité indéfinie de quelque chose (une partie d'un tout).",points:["DU (de + le) → masculin : je mange <strong>du</strong> pain, je bois <strong>du</strong> café","DE LA → féminin : je bois <strong>de la</strong> soupe, j'ai <strong>de la</strong> patience","DE L' → devant voyelle : je bois <strong>de l'</strong>eau","DES → pluriel : je mange <strong>des</strong> fruits","⚠️ Après la négation → DE seulement : je ne mange pas <strong>de</strong> viande"]},exos:[{type:"qcm",q:"'Je voudrais _____ eau, s'il vous plaît.'",opts:["de l'","du","de la","des"],ans:0,exp:"'Eau' est féminin et commence par une voyelle → de l'eau."},
    {type:"qcm",q:"'Il mange _____ riz à chaque repas.'",opts:["du","de la","des","de l'"],ans:0,exp:"'Riz' est masculin → du riz (de + le = du)."},
    {type:"qcm",q:"'Je ne bois pas _____ alcool.'",opts:["d'","du","de l'","de la"],ans:0,exp:"Après la négation, l'article partitif devient 'de' → pas d'alcool (+ élision)."},
    {type:"blank",q:"Elle prépare _____ soupe pour ce soir. (feminine)",ans:"de la",exp:"'Soupe' est féminin → de la soupe. Elle prépare de la soupe."},
    {type:"blank",q:"Il y a _____ fruits dans le panier. (pluriel)",ans:"des",exp:"'Fruits' est pluriel indéfini → des fruits."}],defi:{consigne:"Décris ce qu'il y a dans ton réfrigérateur en ce moment. Utilise du, de la, des.",exemple:"Exemple : Dans mon frigo, il y a du lait, de la salade, des œufs et du fromage."}},
    {id:"J3D4", title:"Exprimer ses goûts", lesson:{titre:"Dire ce qu'on aime ou déteste",regle:"Il existe plusieurs façons d'exprimer son opinion sur la nourriture (et en général).",points:["J'adore / J'aime beaucoup / J'aime bien","Ça me plaît / C'est bon","Je n'aime pas beaucoup / Je n'aime pas","Je déteste / Je ne supporte pas","C'est + adjectif : c'est délicieux, épicé, fade, sucré, salé, amer"]},exos:[{type:"qcm",q:"Du plus fort au plus faible, quel est l'ordre ?",opts:["J'adore > J'aime > J'aime bien","J'aime bien > J'adore > J'aime","J'aime > J'aime bien > J'adore","J'adore > J'aime bien > J'aime"],ans:0,exp:"J'adore (le plus fort) > J'aime > J'aime bien (le plus faible des trois positifs)."},
    {type:"qcm",q:"'Ce plat est trop _____ pour moi.' (beaucoup d'épices)",opts:["épicé","sucré","fade","amer"],ans:0,exp:"'Épicé' = spicy. Sucré = sweet. Fade = bland/tasteless. Amer = bitter."},
    {type:"qcm",q:"Comment dire qu'on n'aime pas du tout quelque chose ?",opts:["Je déteste","Je n'aime pas beaucoup","Ça me plaît","Je n'aime pas trop"],ans:0,exp:"'Détester' est l'expression la plus forte pour exprimer une aversion."},
    {type:"blank",q:"Le citron est _____ (not sweet, opposite of sweet).",ans:"amer",exp:"Le citron est amer (bitter). Le contraire de sucré."},
    {type:"blank",q:"Ce gâteau n'a pas beaucoup de goût. Il est _____ (bland).",ans:"fade",exp:"'Fade' = sans goût, insipide. Un plat sans assez de sel ou d'épices."}],defi:{consigne:"Parle de tes 2 plats préférés et d'un plat que tu n'aimes pas. Explique pourquoi.",exemple:"Exemple : J'adore la pizza parce que c'est savoureux. Je n'aime pas les huîtres car c'est trop fort."}},
    {id:"J3D5", title:"Faire les courses", lesson:{titre:"Au supermarché",regle:"Pour faire les courses, il faut connaître le vocabulaire du supermarché et des quantités.",points:["Les rayons : boulangerie, boucherie, épicerie, fruits et légumes, produits laitiers","Quantités emballées : une bouteille de, un kilo de, un paquet de, une boîte de","Demander de l'aide : 'Excusez-moi, où se trouve... ?' / 'Est-ce que vous avez... ?'"]},exos:[{type:"qcm",q:"'Je voudrais _____ kilo de tomates.'",opts:["un","une","du","de"],ans:0,exp:"'Kilo' est masculin → un kilo. On dit 'un kilo de tomates'."},
    {type:"qcm",q:"Où achète-t-on de la viande ?",opts:["À la boucherie","À la boulangerie","À l'épicerie","Au rayon surgelés"],ans:0,exp:"La boucherie = boucher = magasin spécialisé dans la vente de viande."},
    {type:"qcm",q:"'Une _____ d'eau' (pour une grande bouteille)",opts:["bouteille","boîte","paquet","pot"],ans:0,exp:"L'eau est liquide → on la vend en bouteilles. Une bouteille d'eau."},
    {type:"blank",q:"Je cherche le rayon _____ et légumes.",ans:"fruits",exp:"Le rayon 'fruits et légumes' = la section du supermarché pour les produits frais."},
    {type:"blank",q:"Un _____ de biscuits (a packet/bag)",ans:"paquet",exp:"Un paquet de biscuits = a packet of biscuits. Pour les produits solides emballés."}],defi:{consigne:"Fais une liste de courses pour une semaine. Utilise des quantités précises.",exemple:"Exemple : 2 kilos de pommes, une bouteille de lait, un paquet de pâtes..."}},
    {id:"J3D6", title:"Recette simple : l'imparfait descriptif", lesson:{titre:"Décrire avec l'imparfait",regle:"L'imparfait s'utilise pour décrire des situations dans le passé, des habitudes ou des états (pas des actions ponctuelles).",points:["Description : Il faisait beau. La rue était calme. Les gens souriaient.","Habitude : Quand j'étais enfant, je mangeais des céréales.","État : J'avais faim. Elle était fatiguée. Nous voulions partir.","Terminaisons : -ais, -ais, -ait, -ions, -iez, -aient"]},exos:[{type:"qcm",q:"'Quand j'étais petite, je _____ des bonbons.'",opts:["mangeais","mangeait","mangez","mangerons"],ans:0,exp:"Imparfait, 1re personne : je mangeais. Habitude passée."},
    {type:"qcm",q:"Quel temps convient ? 'Il _____ (faire) froid ce matin-là.'",opts:["faisait","a fait","fait","fera"],ans:0,exp:"Description d'une situation passée → imparfait : il faisait froid."},
    {type:"qcm",q:"'Les enfants _____ (jouer) dans le jardin toute la journée.'",opts:["jouaient","ont joué","jouent","joueront"],ans:0,exp:"Habitude dans le passé → imparfait : les enfants jouaient."},
    {type:"blank",q:"Avant, j'_____ (habiter) à Marseille.",ans:"habitais",exp:"Imparfait de 'habiter' : j'habitais. Situation passée qui durait."},
    {type:"blank",q:"La soupe _____ (sentir) bon. C'était appétissant !",ans:"sentait",exp:"Description dans le passé → imparfait : la soupe sentait bon."}],defi:{consigne:"Raconte un souvenir lié à la nourriture : qu'est-ce que tu mangeais quand tu étais enfant ?",exemple:"Exemple : Quand j'étais enfant, je mangeais beaucoup de riz. Ma mère préparait..."}},
    {id:"J3D7", title:"Révision semaine 3 — Nourriture", lesson:{titre:"Bilan semaine 3",regle:"Tu as appris : le vocabulaire des aliments, commander au restaurant, les articles partitifs, exprimer ses goûts, faire les courses et l'imparfait descriptif.",points:["Articles partitifs : du (masc.), de la (fém.), de l' (voyelle), des (pluriel)","Après négation : → de / d'","Imparfait : description et habitudes dans le passé","Goûts : j'adore > j'aime > j'aime bien / je n'aime pas > je déteste"]},exos:[{type:"qcm",q:"'Elle ne boit pas _____ café.' Quel article ?",opts:["de","du","le","d'un"],ans:0,exp:"Après une négation, les articles partitifs (du/de la/des) deviennent 'de'."},
    {type:"qcm",q:"Quelle phrase est à l'imparfait ?",opts:["Il faisait chaud.","Il a fait chaud.","Il fait chaud.","Il fera chaud."],ans:0,exp:"'Faisait' = imparfait. 'A fait' = passé composé. 'Fait' = présent. 'Fera' = futur."},
    {type:"qcm",q:"Comment commander au restaurant ?",opts:["Je vais prendre le poulet.","Donne-moi le poulet.","Je veux poulet.","Moi poulet."],ans:0,exp:"'Je vais prendre' est la façon la plus naturelle et polie de commander."},
    {type:"blank",q:"Il y a _____ lait dans le frigo. (some milk)",ans:"du",exp:"'Lait' est masculin → du lait (de + le = du). Article partitif."},
    {type:"blank",q:"Quand j'étais jeune, j'_____ beaucoup de sport.",ans:"faisais",exp:"Habitude passée → imparfait : je faisais. (faire → fais- + -ais)"}],defi:{consigne:"Écris une courte critique d'un restaurant que tu as visité (réel ou imaginaire). Décris les plats et donne ton avis.",exemple:"Exemple : J'ai mangé dans un restaurant italien hier. Les pâtes étaient délicieuses mais la sauce était un peu fade..."}}
  ]
},
{
  id:"J4", month:"juillet", num:4,
  title:"Travail et études", theme:"Thème : La vie professionnelle",
  days:[
    {id:"J4D1", title:"Les professions", lesson:{titre:"Parler de son travail",regle:"Pour parler de sa profession, on utilise 'je suis' + profession (sans article en général).",points:["Je suis médecin / infirmier(ère) / professeur(e)","Je travaille comme ingénieur / secrétaire","Je suis étudiant(e) en droit / en médecine","⚠️ Pas d'article : je suis médecin (et non je suis un médecin)"]},exos:[{type:"qcm",q:"'Il travaille dans une école. Il est _____.'",opts:["professeur","un professeur","le professeur","de professeur"],ans:0,exp:"Après 'être', la profession s'utilise sans article → il est professeur."},
    {type:"qcm",q:"'Je suis _____ en informatique.' (student)",opts:["étudiant","étudier","un étudiant","l'étudiant"],ans:0,exp:"'Je suis étudiant(e)' sans article. On peut préciser : étudiant en informatique."},
    {type:"qcm",q:"Quel est le féminin de 'infirmier' ?",opts:["Infirmière","Infirmier","Infirmieuse","Infirmière"],ans:0,exp:"Infirmier → infirmière (on ajoute -e). Attention à l'accent sur le è."},
    {type:"blank",q:"Elle soigne les malades à l'hôpital. Elle est _____.",ans:"médecin",exp:"Un/une médecin soigne les patients. En France, on dit souvent 'médecin' au féminin aussi."},
    {type:"blank",q:"Je _____ comme développeur dans une startup.",ans:"travaille",exp:"'Travailler comme' + profession = une façon naturelle de décrire son travail."}],defi:{consigne:"Décris ton travail ou tes études. Qu'est-ce que tu fais ? Qu'est-ce que tu aimes dans ton travail ?",exemple:"Exemple : Je suis étudiant(e) en marketing. J'aime créer des campagnes publicitaires."}},
    {id:"J4D2", title:"Le futur proche", lesson:{titre:"Parler du futur avec ALLER",regle:"Le futur proche s'utilise pour parler de ce qui va se passer bientôt. Il est très courant dans le langage parlé.",points:["Formation : ALLER (conjugué) + INFINITIF","Je vais travailler / Tu vas partir / Il va pleuvoir","Nous allons manger / Vous allez voir / Ils vont arriver","Négatif : Je ne vais pas travailler aujourd'hui."]},exos:[{type:"qcm",q:"'Elle _____ téléphoner ce soir.'",opts:["va","aller","va à","vas"],ans:0,exp:"Sujet 'elle' → elle va + infinitif. Future proche."},
    {type:"qcm",q:"Mets au futur proche : 'Je mange.'",opts:["Je vais manger.","Je vas manger.","J'aller manger.","Je mange bientôt."],ans:0,exp:"Futur proche = aller conjugué + infinitif → je vais manger."},
    {type:"qcm",q:"Forme négative : 'Nous allons partir.'",opts:["Nous n'allons pas partir.","Nous allons ne pas partir.","Nous ne partons pas aller.","Nous pas allons partir."],ans:0,exp:"La négation entoure le verbe conjugué (aller) → nous n'allons pas partir."},
    {type:"blank",q:"Qu'est-ce que tu vas _____ ce weekend ? (faire)",ans:"faire",exp:"'Faire' est l'infinitif de 'faire'. Futur proche → tu vas faire quoi ?"},
    {type:"blank",q:"Il _____ aller chez le médecin demain. (have to go)",ans:"va",exp:"Il va + infinitif = futur proche. 'Il va aller' = he is going to go."}],defi:{consigne:"Écris tes 5 projets pour le prochain mois. Qu'est-ce que tu vas faire ?",exemple:"Exemple : Le mois prochain, je vais apprendre à cuisiner. Je vais aussi lire un livre en français."}},
    {id:"J4D3", title:"Écrire un email professionnel", lesson:{titre:"Le mail formel en français",regle:"En français, les mails professionnels ont une structure et un vocabulaire spécifiques assez formels.",points:["Début : 'Madame, Monsieur,' ou 'Bonjour M./Mme [Nom],'","Corps : 'Suite à... / Je me permets de... / Je vous contacte pour...'","Fin : 'Dans l'attente de votre réponse, veuillez agréer...' (très formel) ou simplement 'Cordialement,'","Signature : Prénom NOM / Poste / Coordonnées"]},exos:[{type:"qcm",q:"Quelle formule de politesse est la plus formelle ?",opts:["Veuillez agréer mes salutations distinguées.","Cordialement.","À bientôt.","Bonne journée."],ans:0,exp:"'Veuillez agréer...' est très formel, utilisé dans les lettres/mails officiels."},
    {type:"qcm",q:"Pour commencer un mail à un inconnu, on écrit :",opts:["Madame, Monsieur,","Salut,","Coucou,","Hey,"],ans:0,exp:"'Madame, Monsieur,' est la formule standard quand on ne connaît pas le destinataire."},
    {type:"qcm",q:"'Je me permets de vous _____ concernant votre annonce.'",opts:["contacter","contacte","contact","contacterai"],ans:0,exp:"Après 'je me permets de', on utilise l'infinitif → de vous contacter."},
    {type:"blank",q:"Pour terminer un mail professionnel de façon neutre : _____,",ans:"Cordialement",exp:"'Cordialement' est la conclusion la plus utilisée dans les mails pro en France."},
    {type:"blank",q:"'Dans l'_____ de votre réponse' (en attente de)",ans:"attente",exp:"'Dans l'attente de votre réponse' = en attendant que vous répondiez."}],defi:{consigne:"Écris un mail pour postuler à un emploi (réel ou imaginaire). Présente-toi et dis pourquoi tu es intéressé(e).",exemple:"Exemple : Madame, Monsieur, Je me permets de vous contacter au sujet de votre offre d'emploi..."}},
    {id:"J4D4", title:"Les adverbes de fréquence", lesson:{titre:"Dire combien de fois",regle:"Les adverbes de fréquence permettent d'indiquer combien de fois on fait quelque chose.",points:["Toujours > souvent > régulièrement > parfois > rarement > jamais","Position : après le verbe au présent → Je travaille souvent le weekend","Au passé composé : entre l'auxiliaire et le participe → J'ai souvent travaillé"]},exos:[{type:"qcm",q:"Du plus fréquent au moins fréquent :",opts:["Toujours > souvent > parfois > jamais","Parfois > souvent > toujours > jamais","Jamais > parfois > souvent > toujours","Souvent > toujours > rarement > parfois"],ans:0,exp:"L'ordre de fréquence : toujours (100%) → souvent → parfois → rarement → jamais (0%)."},
    {type:"qcm",q:"'Je ne travaille _____ le dimanche.' (never)",opts:["jamais","toujours","souvent","parfois"],ans:0,exp:"'Ne...jamais' = never. Jamais se place après le verbe (ou entre auxiliaire et participe)."},
    {type:"qcm",q:"'Il _____ oublie ses clés.' (always)",opts:["oublie toujours","toujours oublie","a toujours oublié","oublie jamais"],ans:0,exp:"'Toujours' se place après le verbe conjugué → il oublie toujours."},
    {type:"blank",q:"Elle va _____ au cinéma le vendredi. (sometimes)",ans:"parfois",exp:"'Parfois' = sometimes. Elle va parfois au cinéma = elle y va de temps en temps."},
    {type:"blank",q:"Je ne mange _____ de fast-food. (rarely)",ans:"rarement",exp:"'Rarement' = rarely. Attention : 'rarement' seul n'est pas une négation, on peut l'utiliser sans 'ne'."}],defi:{consigne:"Décris tes habitudes professionnelles ou de study. Utilise 5 adverbes de fréquence différents.",exemple:"Exemple : Je travaille toujours le matin. Je vérifie souvent mes mails. Je fais parfois du sport à midi."}},
    {id:"J4D5", title:"Donner des instructions (impératif)", lesson:{titre:"L'impératif — donner des ordres ou des conseils",regle:"L'impératif s'utilise pour donner des ordres, des conseils ou des instructions. Il n'a que 3 personnes.",points:["TU : Mange ! / Parle ! / Fais attention !","NOUS : Mangeons ! / Parlons ! / Allons-y !","VOUS : Mangez ! / Parlez ! / Faites attention !","Avec les verbes en -ER, le 'tu' perd le 's' : tu parles → Parle !"]},exos:[{type:"qcm",q:"Comment dit-on 'Listen !' (à un ami, tutoiement) ?",opts:["Écoute !","Écoutez !","Écoutons !","Tu écoutes !"],ans:0,exp:"Impératif 'tu' pour les verbes en -ER → perd le -s → Écoute !"},
    {type:"qcm",q:"'_____ attention à la marche !' (vous)",opts:["Faites","Fais","Faire","Font"],ans:0,exp:"Impératif 'vous' de 'faire' = Faites. (Verbe irrégulier)"},
    {type:"qcm",q:"Pour encourager un groupe à partir : '_____ !'",opts:["Allons-y !","Allez-y !","Va !","Aller !"],ans:0,exp:"'Allons-y !' = let's go! (impératif 'nous'). 'Allez-y !' s'adresserait à vous/eux."},
    {type:"blank",q:"(Tu) _____ ce document avant 17h ! (finir)",ans:"Finis",exp:"Impératif 'tu' de 'finir' → Finis ! (verbes en -IR gardent le -s)."},
    {type:"blank",q:"(Vous) _____ la porte, s'il vous plaît. (fermer)",ans:"Fermez",exp:"Impératif 'vous' de 'fermer' → Fermez ! Même forme que le présent vous."}],defi:{consigne:"Écris 5 conseils pour apprendre le français efficacement. Utilise l'impératif.",exemple:"Exemple : Écoute de la musique française. Regarde des films avec des sous-titres. Parle avec des natifs..."}},
    {id:"J4D6", title:"Le CV et se présenter (B1)", lesson:{titre:"Se présenter professionnellement — niveau B1",regle:"Pour un entretien ou une présentation formelle, il faut structurer son discours.",points:["Formation : J'ai obtenu un diplôme de / Je suis diplômé(e) en...","Expérience : J'ai travaillé pendant X ans en tant que... / J'ai occupé le poste de...","Compétences : Je maîtrise... / J'ai de l'expérience en... / Je suis capable de...","Motivation : Ce qui m'attire dans ce poste, c'est... / Je suis passionné(e) par..."]},exos:[{type:"qcm",q:"'J'ai _____ un master en économie.' (obtained)",opts:["obtenu","obtenu","obtenir","obtenus"],ans:0,exp:"Passé composé de 'obtenir' (irrégulier) → j'ai obtenu. Participe passé = obtenu."},
    {type:"qcm",q:"'Je _____ le poste de responsable marketing pendant 3 ans.'",opts:["ai occupé","occupais","occuper","occupe"],ans:0,exp:"Expérience terminée dans le passé → passé composé : j'ai occupé."},
    {type:"qcm",q:"'Ce qui m'_____ dans ce poste, c'est la créativité.'",opts:["attire","attrait","attirait","attirera"],ans:0,exp:"Présent pour une motivation actuelle → ce qui m'attire (présent de l'indicatif)."},
    {type:"blank",q:"Je _____ l'anglais et l'espagnol couramment. (master/speak fluently)",ans:"maîtrise",exp:"'Maîtriser une langue' = la parler très bien, la dominer. Je maîtrise = présent."},
    {type:"blank",q:"J'ai de l'expérience _____ la gestion de projet.",ans:"en",exp:"'Avoir de l'expérience en + domaine' = la formulation naturelle en français."}],defi:{consigne:"Écris un paragraphe de présentation professionnelle comme si tu passais un entretien d'embauche.",exemple:"Exemple : Bonjour, je m'appelle... J'ai obtenu un diplôme en... J'ai travaillé pendant... Ce qui m'attire dans ce poste..."}},
    {id:"J4D7", title:"Révision semaine 4 — Travail", lesson:{titre:"Bilan semaine 4",regle:"Cette semaine : les professions, le futur proche, l'email professionnel, les adverbes de fréquence, l'impératif, et se présenter en B1.",points:["Futur proche : aller conjugué + infinitif","Impératif : Mange ! / Mangeons ! / Mangez !","Adverbes : toujours > souvent > parfois > rarement > jamais","Email : Madame, Monsieur... Cordialement"]},exos:[{type:"qcm",q:"'Nous _____ présenter notre projet lundi.' (futur proche)",opts:["allons","allons à","irons","voulons"],ans:0,exp:"Futur proche : nous allons + infinitif → nous allons présenter."},
    {type:"qcm",q:"'_____ vos mails avant 9h !' (vous, vérifier)",opts:["Vérifiez","Vérifier","Vous vérifiez","Vérifions"],ans:0,exp:"Impératif 'vous' de 'vérifier' → Vérifiez ! (terminaison -ez)"},
    {type:"qcm",q:"Elle va _____ au bureau à vélo. (toujours)",opts:["toujours aller","aller toujours","aller jamais","toujours à"],ans:0,exp:"'Toujours' se place après le verbe auxiliaire dans le futur proche → va toujours aller."},
    {type:"blank",q:"Je suis _____ en droit. (student)",ans:"étudiant",exp:"'Je suis étudiant(e) en droit' = sans article avant la profession."},
    {type:"blank",q:"J'ai _____ un diplôme d'ingénieur en 2020.",ans:"obtenu",exp:"Participe passé irrégulier de 'obtenir' → obtenu. (J'ai obtenu mon diplôme)"}],defi:{consigne:"Rédige un petit email professionnel pour demander un jour de congé à ton supérieur.",exemple:"Exemple : Madame, Monsieur, Je me permets de vous contacter afin de solliciter un jour de congé le..."}}
  ]
},
// Semaine 5 Juillet
{
  id:"J5", month:"juillet", num:5,
  title:"Santé et corps", theme:"Thème : La santé",
  days:[
    {id:"J5D1", title:"Le corps humain", lesson:{titre:"Les parties du corps",regle:"Connaître les parties du corps est essentiel pour communiquer avec un médecin ou décrire une douleur.",points:["La tête : les yeux, le nez, la bouche, les oreilles, les dents","Le tronc : le dos, le ventre, la poitrine, les épaules","Les membres : les bras, les mains, les jambes, les pieds","Verbe utile : avoir mal à... → J'ai mal à la tête / J'ai mal au dos"]},exos:[{type:"qcm",q:"'J'ai mal _____ dos.' Quelle préposition ?",opts:["au","à le","à la","du"],ans:0,exp:"'Dos' est masculin → à + le = au. J'ai mal au dos."},
    {type:"qcm",q:"Où sont les yeux ?",opts:["Sur le visage","Dans la bouche","Sur les épaules","Au bout des doigts"],ans:0,exp:"Les yeux se trouvent sur le visage, de chaque côté du nez."},
    {type:"qcm",q:"'Elle a mal _____ gorge.' (throat)",opts:["à la","au","aux","de la"],ans:0,exp:"'Gorge' est féminin → à la gorge. Elle a mal à la gorge."},
    {type:"blank",q:"Les _____ servent à marcher et à courir. (legs)",ans:"jambes",exp:"Les jambes (les deux membres inférieurs) servent à se déplacer."},
    {type:"blank",q:"'J'ai mal _____ dents.' (teeth)",ans:"aux",exp:"'Dents' est pluriel → à + les = aux. J'ai mal aux dents."}],defi:{consigne:"Tu as mal quelque part. Décris tes symptômes comme si tu appelais le médecin.",exemple:"Exemple : Bonjour docteur, j'ai mal à la tête depuis hier et j'ai aussi mal à la gorge..."}},
    {id:"J5D2", title:"Chez le médecin", lesson:{titre:"Une consultation médicale",regle:"Chez le médecin, il faut savoir décrire ses symptômes et comprendre les conseils du médecin.",points:["'Où avez-vous mal ?' / 'Depuis quand ?' / 'Avez-vous de la fièvre ?'","'J'ai de la fièvre / Je tousse / J'ai le nez qui coule / Je suis enrhumé(e)'","'Je vais vous prescrire... / Prenez ce médicament 3 fois par jour'","L'ordonnance = la prescription du médecin"]},exos:[{type:"qcm",q:"Comment dit-on 'I have a cold' ?",opts:["Je suis enrhumé(e).","J'ai froid.","Je tousse.","J'ai chaud."],ans:0,exp:"'Être enrhumé(e)' = avoir un rhume (cold). Attention : 'avoir froid' = to feel cold (température)."},
    {type:"qcm",q:"'Depuis _____ avez-vous ces symptômes ?' (how long)",opts:["combien de temps","quand","pourquoi","comment"],ans:0,exp:"'Depuis combien de temps' demande la durée. 'Depuis quand' demande la date de début."},
    {type:"qcm",q:"L'ordonnance est :",opts:["Le document du médecin pour les médicaments","La liste des symptômes","La carte d'assurance maladie","Le résultat d'une analyse"],ans:0,exp:"L'ordonnance (prescription) = le document signé par le médecin pour acheter des médicaments."},
    {type:"blank",q:"Je _____ depuis 3 jours. (to cough)",ans:"tousse",exp:"Tousser → je tousse. 'Je tousse depuis 3 jours' = I've been coughing for 3 days."},
    {type:"blank",q:"Le médecin m'a _____ du sirop pour la toux. (prescribed)",ans:"prescrit",exp:"Prescrire (irrégulier) → prescrit. Le médecin m'a prescrit = the doctor prescribed me."}],defi:{consigne:"Écris un dialogue entre un médecin et un patient qui a de la fièvre et mal à la gorge.",exemple:"Exemple : Médecin : Bonjour, qu'est-ce qui vous amène ? Patient : Bonjour docteur, j'ai de la fièvre..."}},
    {id:"J5D3", title:"Les habitudes saines", lesson:{titre:"Parler de sa santé",regle:"Pour parler de santé et de bien-être, on utilise des expressions courantes.",points:["Faire du sport / faire de l'exercice / bouger","Bien dormir / avoir une bonne hygiène de sommeil","Manger équilibré / éviter le sucre / boire assez d'eau","Se sentir bien / être en forme / être fatigué(e)"]},exos:[{type:"qcm",q:"'Je _____ du sport 3 fois par semaine.' (faire)",opts:["fais","fait","faits","faire"],ans:0,exp:"'Faire du sport' → je fais (1re personne singulier du verbe irrégulier 'faire')."},
    {type:"qcm",q:"'Je me sens très _____ ce matin.' (in shape/well)",opts:["en forme","malade","fatigué","enrhumé"],ans:0,exp:"'Être en forme' = to be in good shape, to feel well. Très utilisé en français."},
    {type:"qcm",q:"Quel conseil est sain ?",opts:["Boire 1,5 litre d'eau par jour.","Dormir 4 heures par nuit.","Manger du sucre à chaque repas.","Éviter l'exercice physique."],ans:0,exp:"Les recommandations de santé : boire environ 1,5 à 2 litres d'eau par jour."},
    {type:"blank",q:"Je ne _____ pas assez la nuit. (dormir)",ans:"dors",exp:"Dormir → je dors (irrégulier). 'Je ne dors pas assez' = I don't sleep enough."},
    {type:"blank",q:"Il faut _____ le stress pour être en bonne santé. (éviter)",ans:"éviter",exp:"'Éviter' = to avoid. Il faut éviter le stress, le sucre, l'alcool..."}],defi:{consigne:"Décris tes habitudes de santé : qu'est-ce que tu fais de bien ? Qu'est-ce que tu pourrais améliorer ?",exemple:"Exemple : Je fais du jogging le matin mais je dors parfois seulement 6 heures. Je pourrais manger plus de légumes."}},
    {id:"J5D4", title:"Les conseils — devoir, pouvoir, falloir", lesson:{titre:"Les verbes modaux",regle:"Les verbes modaux permettent d'exprimer l'obligation, la possibilité ou le conseil.",points:["DEVOIR + inf. = obligation : Tu dois manger plus de légumes.","POUVOIR + inf. = possibilité/permission : Tu peux sortir ce soir.","IL FAUT + inf. = obligation générale : Il faut dormir 8 heures.","DEVRAIT (conditionnel) = conseil doux : Tu devrais faire plus de sport."]},exos:[{type:"qcm",q:"'Tu _____ aller chez le médecin.' (you should)",opts:["devrais","dois","peux","faut"],ans:0,exp:"'Tu devrais' = conditionnel de 'devoir' → conseil doux, pas une obligation forte."},
    {type:"qcm",q:"'Il _____ prendre ce médicament 2 fois par jour.' (must, impersonal)",opts:["faut","faut de","doit","peut"],ans:0,exp:"'Il faut + infinitif' est une expression impersonnelle pour l'obligation générale."},
    {type:"qcm",q:"'Je _____ venir demain ?' (can I... is it possible?)",opts:["peux","dois","faut","devrais"],ans:0,exp:"'Pouvoir' exprime la possibilité ou la permission → je peux venir ?"},
    {type:"blank",q:"Vous _____ vous reposer davantage. (should — conseil médical)",ans:"devriez",exp:"'Vous devriez' = conditionnel de 'devoir' → conseil poli et professionnel."},
    {type:"blank",q:"Il _____ éviter le soleil pendant le traitement. (is necessary)",ans:"faut",exp:"'Il faut + infinitif' = it is necessary to. Forme impersonnelle d'obligation."}],defi:{consigne:"Donne 5 conseils de santé à un ami qui est souvent fatigué. Utilise devoir, pouvoir et il faut.",exemple:"Exemple : Tu devrais dormir plus tôt. Il faut aussi boire beaucoup d'eau. Tu peux faire du yoga..."}},
    {id:"J5D5", title:"Décrire ses émotions", lesson:{titre:"Exprimer ses émotions",regle:"Parler de ses émotions est important pour communiquer en français. Il faut connaître les expressions essentielles.",points:["Positif : je suis content(e), heureux(se), soulagé(e), enthousiaste","Négatif : je suis triste, inquiet(ète), stressé(e), déçu(e), énervé(e)","Neutre : je suis surpris(e), confus(e), fatigué(e)","Structure : je me sens + adjectif / j'ai l'impression que + phrase"]},exos:[{type:"qcm",q:"'Elle _____ triste depuis plusieurs jours.'",opts:["est","a","fait","semble être"],ans:0,exp:"'Être + adjectif d'émotion' → elle est triste. Verbe 'être' pour les états."},
    {type:"qcm",q:"'Je suis _____ de ton succès !' (very happy for you)",opts:["ravi(e)","énervé(e)","déçu(e)","inquiet"],ans:0,exp:"'Ravi(e)' = très content(e), enchanté(e). Très fort, très positif."},
    {type:"qcm",q:"Quel mot exprime une émotion négative ?",opts:["Anxieux","Soulagé","Enthousiaste","Ravi"],ans:0,exp:"'Anxieux/anxieuse' = worried, anxious. Les autres sont positifs ou neutres."},
    {type:"blank",q:"J'ai l'_____ que quelque chose ne va pas. (impression)",ans:"impression",exp:"'J'ai l'impression que' = I have a feeling that. Très naturel pour exprimer un doute."},
    {type:"blank",q:"Il se sent _____ après l'opération. (relieved)",ans:"soulagé",exp:"'Soulagé(e)' = relieved. Le soulagement vient après quelque chose d'inquiétant."}],defi:{consigne:"Comment tu te sens en ce moment ? Décris 3 émotions que tu ressens et explique pourquoi.",exemple:"Exemple : Je me sens un peu stressé(e) parce que j'ai beaucoup de travail. Mais je suis aussi content(e) car..."}},
    {id:"J5D6", title:"Le conditionnel présent (B1)", lesson:{titre:"Le conditionnel — politesse et hypothèses",regle:"Le conditionnel présent s'utilise pour être poli, formuler des souhaits, ou imaginer des situations.",points:["Formation : radical du futur + terminaisons de l'imparfait (-ais, -ais, -ait, -ions, -iez, -aient)","Politesse : Je voudrais / Pourriez-vous... ? / Ce serait bien si...","Hypothèse : Si j'avais le temps, je voyagerais.","Conseil : Tu devrais / Il faudrait"]},exos:[{type:"qcm",q:"'Si j'avais plus d'argent, j'_____ le monde.' (voyager)",opts:["voyagerais","voyagerai","voyage","voyagez"],ans:0,exp:"Condition irréelle : si + imparfait → conditionnel présent → je voyagerais."},
    {type:"qcm",q:"'_____ vous me passer le sel ?' (very polite request)",opts:["Pourriez","Pouvez","Pouviez","Pourrez"],ans:0,exp:"'Pourriez-vous' = conditionnel de 'pouvoir' → formule très polie."},
    {type:"qcm",q:"Quelle phrase est au conditionnel ?",opts:["Ce serait fantastique !","C'est fantastique !","C'était fantastique !","Ce sera fantastique !"],ans:0,exp:"'Serait' = conditionnel de 'être'. Les autres sont présent, imparfait et futur."},
    {type:"blank",q:"Il _____ mieux qu'il consulte un médecin. (it would be better)",ans:"vaudrait",exp:"'Il vaudrait mieux' = it would be better. Conditionnel de 'valoir'."},
    {type:"blank",q:"Tu _____ parler à ton chef de ce problème. (should)",ans:"devrais",exp:"'Tu devrais' = conditionnel de 'devoir'. Conseil formulé avec douceur."}],defi:{consigne:"Imagine ta vie idéale. Si tu pouvais changer 3 choses, qu'est-ce que tu ferais ?",exemple:"Exemple : Si j'avais plus de temps, je voyagerais souvent. Si j'avais un grand jardin, je ferais du jardinage."}},
    {id:"J5D7", title:"Révision semaine 5 — Santé", lesson:{titre:"Bilan semaine 5",regle:"Cette semaine : le corps, chez le médecin, les habitudes saines, les verbes modaux, les émotions et le conditionnel.",points:["Avoir mal à + article : j'ai mal au dos / à la tête / aux dents","Modaux : devoir (obligation) / pouvoir (possibilité) / falloir (nécessité générale)","Conditionnel : si + imparfait → conditionnel présent","Émotions : être content/triste/stressé/soulagé..."]},exos:[{type:"qcm",q:"'J'ai mal _____ yeux.' Quel article ?",opts:["aux","à les","au","à la"],ans:0,exp:"'Yeux' est pluriel → à + les = aux. J'ai mal aux yeux."},
    {type:"qcm",q:"'Tu _____ aller te coucher tôt.' (advice: should)",opts:["devrais","dois","peux","faudrait"],ans:0,exp:"Conseil doux → conditionnel de 'devoir' : tu devrais."},
    {type:"qcm",q:"'Si elle avait le choix, elle _____ à la campagne.' (vivre)",opts:["vivrait","vivra","vit","vivait"],ans:0,exp:"Si + imparfait → conditionnel → elle vivrait."},
    {type:"blank",q:"Je me sens très _____ aujourd'hui. Je n'ai pas bien dormi. (tired)",ans:"fatigué",exp:"'Fatigué(e)' = tired. Se sent fatigué(e) = feels tired."},
    {type:"blank",q:"Il _____ consulter un médecin rapidement. (must)",ans:"faut",exp:"'Il faut' + infinitif = obligation impersonnelle générale."}],defi:{consigne:"Écris une liste de conseils de santé pour quelqu'un qui commence à se sentir mal. Sois précis(e) et bienveillant(e).",exemple:"Exemple : Tu devrais te reposer. Il faut boire beaucoup d'eau. Essaie de manger légèrement..."}}
  ]
},
// AOÛT - Semaines 1-4 (condensées pour couvrir 31 jours)
{
  id:"A1", month:"aout", num:1,
  title:"Opinion et argumentation", theme:"Thème : S'exprimer — niveau B1",
  days:[
    {id:"A1D1", title:"Donner son avis", lesson:{titre:"Exprimer une opinion en français",regle:"Pour donner son avis, il faut connaître les expressions qui introduisent une opinion.",points:["Je pense que / Je crois que / J'estime que + indicatif","À mon avis / Selon moi / D'après moi","Il me semble que / J'ai l'impression que","Pour exprimer un accord/désaccord : Tout à fait ! / Je ne suis pas d'accord."]},exos:[{type:"qcm",q:"'_____ moi, ce film est excellent.'",opts:["À mon avis selon","Selon","D'après","À mon avis /"],ans:1,exp:"'Selon moi' ou 'À mon avis' ou 'D'après moi' sont les 3 expressions correctes."},
    {type:"qcm",q:"'Je pense _____ il a raison.'",opts:["que","qui","qu'","quoi"],ans:0,exp:"'Je pense que' + indicatif → que (et non 'qui' qui est un pronom relatif)."},
    {type:"qcm",q:"Comment exprimer un désaccord poli ?",opts:["Je ne suis pas tout à fait d'accord.","Tu as tort !","Non !","C'est faux."],ans:0,exp:"'Je ne suis pas tout à fait d'accord' est une façon polie de nuancer un désaccord."},
    {type:"blank",q:"Il me _____ que cette solution n'est pas idéale.",ans:"semble",exp:"'Il me semble que' = it seems to me that. Exprime une opinion incertaine."},
    {type:"blank",q:"D'_____ le rapport, les résultats sont positifs.",ans:"après",exp:"'D'après' = according to. D'après le rapport = according to the report."}],defi:{consigne:"Donne ton avis sur les réseaux sociaux : est-ce plutôt positif ou négatif ? Écris 5-6 phrases.",exemple:"Exemple : À mon avis, les réseaux sociaux ont des avantages et des inconvénients. Je pense que..."}},
    {id:"A1D2", title:"Les connecteurs logiques", lesson:{titre:"Structurer son discours",regle:"Les connecteurs logiques permettent de lier les idées et de structurer un argument.",points:["Addition : de plus, en outre, également, par ailleurs","Cause : parce que, car, puisque, étant donné que","Conséquence : donc, c'est pourquoi, ainsi, par conséquent","Opposition : mais, cependant, néanmoins, or, pourtant","Concession : bien que + subjonctif, même si, quand même"]},exos:[{type:"qcm",q:"'Je suis fatigué, _____ je continue à travailler.' (nevertheless)",opts:["néanmoins","donc","car","puisque"],ans:0,exp:"'Néanmoins' exprime une opposition/concession : malgré la fatigue, il continue."},
    {type:"qcm",q:"'Il pleut, _____ je prends un parapluie.' (so/therefore)",opts:["c'est pourquoi","cependant","bien que","or"],ans:0,exp:"'C'est pourquoi' = therefore, that's why. Il pleut → c'est pourquoi je prends un parapluie."},
    {type:"qcm",q:"'_____ il soit tard, elle travaille encore.' (even though)",opts:["Bien que","Car","Donc","De plus"],ans:0,exp:"'Bien que' + subjonctif exprime une concession. Bien qu'il soit tard (subjonctif de 'être')."},
    {type:"blank",q:"Il est très compétent. _____ plus, il est ponctuel.",ans:"De",exp:"'De plus' = furthermore, moreover. S'utilise pour ajouter un argument."},
    {type:"blank",q:"Je n'aime pas ce restaurant, _____ la nourriture est trop chère.",ans:"car",exp:"'Car' = because. Introduit une cause (même sens que 'parce que', plus soutenu)."}],defi:{consigne:"Écris un court texte argumentatif (6-8 phrases) sur : 'Est-il mieux de vivre en ville ou à la campagne ?'",exemple:"Exemple : Selon moi, il est préférable de vivre en ville. En effet, il y a de nombreux avantages..."}},
    {id:"A1D3", title:"Le subjonctif présent", lesson:{titre:"Le subjonctif — quand l'utiliser ?",regle:"Le subjonctif s'utilise après certaines expressions qui expriment doute, souhait, obligation ou sentiment.",points:["Obligation : il faut que, il est nécessaire que → il faut que tu viennes","Souhait : je veux que, je souhaite que → je veux qu'il parte","Sentiment : je suis content que, j'ai peur que → j'ai peur qu'il soit malade","Formation : radical 'ils' du présent + terminaisons (-e, -es, -e, -ions, -iez, -ent)"]},exos:[{type:"qcm",q:"'Il faut que tu _____ à temps.' (arriver)",opts:["arrives","arriverais","arrive","arrivais"],ans:0,exp:"'Il faut que' → subjonctif. 'Arriver' → que tu arrives (subjonctif présent)."},
    {type:"qcm",q:"'Je suis contente qu'il _____ guéri.' (être)",opts:["soit","est","était","sera"],ans:0,exp:"Sentiment → subjonctif. 'Être' au subjonctif → que je sois, que tu sois, qu'il soit."},
    {type:"qcm",q:"Quelle expression n'est PAS suivie du subjonctif ?",opts:["Je pense que","Il faut que","Je veux que","Bien que"],ans:0,exp:"'Je pense que' est suivi de l'indicatif (pas du subjonctif) car c'est une certitude."},
    {type:"blank",q:"Il est important que vous _____ ce document. (lire)",ans:"lisiez",exp:"Subjonctif de 'lire' : que je lise, que tu lises, que vous lisiez."},
    {type:"blank",q:"J'ai peur qu'elle ne _____ pas venir. (pouvoir)",ans:"puisse",exp:"Subjonctif irrégulier de 'pouvoir' → que je puisse, que tu puisses, qu'il puisse."}],defi:{consigne:"Exprime 4 souhaits ou craintes pour l'avenir en utilisant le subjonctif.",exemple:"Exemple : Je veux que le monde soit plus pacifique. J'ai peur que le changement climatique s'aggrave."}},
    {id:"A1D4", title:"Comparer et nuancer", lesson:{titre:"Les comparatifs et superlatifs",regle:"Pour comparer des choses ou des personnes, on utilise des structures précises.",points:["Plus... que / Moins... que / Aussi... que","Le/la/les plus + adj. → le plus grand de la classe","Le/la/les moins + adj.","Comparatifs irréguliers : bon → meilleur / mauvais → pire / bien → mieux"]},exos:[{type:"qcm",q:"'Ce restaurant est _____ que l'autre.' (better)",opts:["meilleur","mieux","plus bon","bon plus"],ans:0,exp:"'Meilleur' est le comparatif irrégulier de 'bon' (pour les noms/qualités). Mieux → pour les verbes."},
    {type:"qcm",q:"'Elle parle _____ que moi.' (better — adverb)",opts:["mieux","meilleur","plus bien","meilleurement"],ans:0,exp:"'Mieux' est le comparatif de l'adverbe 'bien'. Pour les verbes → parler mieux."},
    {type:"qcm",q:"'C'est _____ film de l'année.' (the best)",opts:["le meilleur","le mieux","le plus bon","le bon"],ans:0,exp:"Superlatif de 'bon' → le meilleur / la meilleure. Adjectif irrégulier."},
    {type:"blank",q:"Cette solution est _____ efficace que la précédente. (less)",ans:"moins",exp:"'Moins... que' = less... than. Structure de comparatif d'infériorité."},
    {type:"blank",q:"C'est le _____ résultat possible. (worst)",ans:"pire",exp:"'Le pire' = the worst. Superlatif irrégulier de 'mauvais'."}],defi:{consigne:"Compare deux choses que tu connais bien (deux villes, deux films, deux restaurants...). 5-6 phrases.",exemple:"Exemple : Paris est plus grand que Lyon, mais Lyon est moins stressante. À mon avis, Lyon offre une meilleure qualité de vie."}},
    {id:"A1D5", title:"Rapporter des paroles", lesson:{titre:"Le discours indirect",regle:"Pour rapporter ce que quelqu'un a dit, on utilise le discours indirect. Les temps et les pronoms changent.",points:["Direct : Il dit 'je viens.' → Indirect : Il dit qu'il vient.","Direct : Elle a dit 'j'ai fini.' → Indirect : Elle a dit qu'elle avait fini.","Direct : Il a demandé 'Tu viens ?' → Indirect : Il a demandé si je venais.","Changements de temps : présent → imparfait / passé composé → plus-que-parfait"]},exos:[{type:"qcm",q:"'Je suis fatigué.' → Il a dit qu'il _____ fatigué.",opts:["était","est","a été","serait"],ans:0,exp:"Au discours indirect passé : le présent devient l'imparfait → il était fatigué."},
    {type:"qcm",q:"'Est-ce qu'il vient ?' → Elle a demandé _____ il venait.",opts:["si","que","ce que","quand"],ans:0,exp:"Pour les questions oui/non au discours indirect → si (+ imparfait)."},
    {type:"qcm",q:"'Viens ici !' → Il lui a dit _____ ici.",opts:["de venir","qu'il vient","si venir","venir"],ans:0,exp:"L'impératif au discours indirect devient : dire de + infinitif → de venir."},
    {type:"blank",q:"'Je partirai demain.' → Elle a dit qu'elle _____ le lendemain.",ans:"partirait",exp:"Futur → conditionnel au discours indirect passé : partirait."},
    {type:"blank",q:"'Qu'est-ce que tu veux ?' → Il a demandé ce _____ je voulais.",ans:"que",exp:"Pour les questions avec 'que/quoi', au discours indirect → ce que + imparfait."}],defi:{consigne:"Rapporte une conversation que tu as eue (ou imagine une). Utilise le discours indirect.",exemple:"Exemple : Hier, ma mère m'a dit qu'elle était fatiguée. Elle m'a demandé si je pouvais l'aider."}},
    {id:"A1D6", title:"Écrire un texte argumentatif", lesson:{titre:"La structure d'un texte argumentatif (B1)",regle:"Un texte argumentatif en français a une structure claire et utilise des connecteurs.",points:["Introduction : Présenter le sujet + annoncer le plan","Développement : Argument 1 + exemple / Argument 2 + exemple","Concession : Certes... mais... / Il est vrai que... cependant...","Conclusion : Rappel des idées + prise de position personnelle"]},exos:[{type:"qcm",q:"Quelle phrase introduit une concession ?",opts:["Certes, il y a des avantages, mais...","D'abord, il faut noter que...","En conclusion, je pense que...","Par exemple, on peut citer..."],ans:0,exp:"'Certes... mais' introduit une concession : on reconnaît un argument avant de le nuancer."},
    {type:"qcm",q:"'Par exemple, on peut citer...' → ce connecteur sert à :",opts:["Illustrer un argument","Conclure","Introduire une cause","Marquer une opposition"],ans:0,exp:"'Par exemple' introduit un exemple pour illustrer et renforcer un argument."},
