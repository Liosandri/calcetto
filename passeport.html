    {type:"qcm",q:"Quelle phrase est une bonne conclusion ?",opts:["En définitive, il semble que les avantages l'emportent.","Premièrement, on peut dire que...","Parce que c'est important.","C'est pourquoi je n'aime pas cela."],ans:0,exp:"'En définitive' = finalement, en conclusion. C'est une formule de conclusion naturelle."},
    {type:"blank",q:"_____ vrai que c'est difficile, mais ça vaut la peine.",ans:"Il est",exp:"'Il est vrai que... mais' = c'est une structure de concession très utile à l'écrit."},
    {type:"blank",q:"En _____, je pense que l'effort en vaut la peine.",ans:"conclusion",exp:"'En conclusion' = in conclusion. Formule classique pour terminer un texte."}],defi:{consigne:"Écris un court texte argumentatif (8-10 phrases) sur : 'Les voyages forment-ils la personnalité ?'",exemple:"Exemple : En introduction : Les voyages sont souvent considérés comme une source d'apprentissage. Dans cet essai..."}},
    {id:"A1D7", title:"Révision semaine 1 Août — Opinion", lesson:{titre:"Bilan Août semaine 1",regle:"Tu as appris : donner son avis, les connecteurs, le subjonctif, les comparatifs, le discours indirect et l'argumentatif.",points:["Subjonctif après : il faut que, je veux que, bien que, j'ai peur que","Comparatifs : plus/moins/aussi... que / meilleur-mieux-pire","Discours indirect : présent → imparfait / futur → conditionnel","Connecteurs : de plus, cependant, c'est pourquoi, bien que"]},exos:[{type:"qcm",q:"'Bien qu'il _____ fatigué, il continue.' (être — subjonctif)",opts:["soit","est","était","sera"],ans:0,exp:"Subjonctif de 'être' → qu'il soit. 'Bien que' impose le subjonctif."},
    {type:"qcm",q:"'Il a dit qu'il _____ bientôt.' (partir — discours indirect passé)",opts:["partirait","part","partira","partait"],ans:0,exp:"Discours indirect passé : futur → conditionnel. Il partirait bientôt."},
    {type:"qcm",q:"'Ce vin est _____ que l'autre.' (better)",opts:["meilleur","mieux","plus bon","le meilleur"],ans:0,exp:"Comparatif de 'bon' → meilleur (adjectif qui qualifie un nom)."},
    {type:"blank",q:"Il faut que tu _____ cette lettre aujourd'hui. (écrire — subjonctif)",ans:"écrives",exp:"Subjonctif de 'écrire' : que tu écrives (radical 'ils écrivent' → écrive-)."},
    {type:"blank",q:"À mon _____, c'est la meilleure solution.",ans:"avis",exp:"'À mon avis' = in my opinion. Expression très fréquente pour donner son opinion."}],defi:{consigne:"Écris un texte de 10 phrases sur un sujet qui te tient à cœur. Utilise des connecteurs et le subjonctif au moins une fois.",exemple:"Exemple : La lecture est importante dans ma vie. Je pense que les livres permettent de... Bien que la télévision soit populaire..."}}
  ]
},
{
  id:"A2", month:"aout", num:2,
  title:"Culture et médias", theme:"Thème : Cinéma, littérature, actualités",
  days:[
    {id:"A2D1", title:"Parler d'un film ou d'un livre", lesson:{titre:"La critique culturelle",regle:"Pour parler d'un film ou d'un livre, il faut maîtriser le vocabulaire spécifique et savoir donner son avis.",points:["Film : l'intrigue, les personnages, la mise en scène, la bande originale","Livre : l'auteur(e), le narrateur, le style, le dénouement, l'intrigue","Exprimer : C'est captivant / décevant / touchant / bien construit / prévisible","Recommander : Je vous conseille vivement / Ça vaut le coup d'être vu/lu"]},exos:[{type:"qcm",q:"'Ce film est très _____ — je n'ai pas vu la fin venir !' (unpredictable)",opts:["imprévisible","prévisible","décevant","ennuyeux"],ans:0,exp:"'Imprévisible' = unpredictable. 'Prévisible' = predictable (on voit venir la fin)."},
    {type:"qcm",q:"'L'_____ du film est complexe et bien construite.' (plot)",opts:["intrigue","acteur","scénario","mise en scène"],ans:0,exp:"'L'intrigue' = the plot (l'histoire principale du film ou du livre)."},
    {type:"qcm",q:"'Je vous _____ vivement ce roman.' (strongly recommend)",opts:["conseille","conseil","recommandation","suggère"],ans:0,exp:"'Conseiller' = recommander. Je vous conseille vivement = I strongly recommend to you."},
    {type:"blank",q:"Ce film m'a beaucoup _____ — j'ai pleuré ! (touched/moved)",ans:"touché",exp:"'Toucher' = to move (emotionally). Ce film m'a touché = this film moved me."},
    {type:"blank",q:"La _____ en scène de ce film est magnifique. (directing)",ans:"mise",exp:"'La mise en scène' = the direction/staging. La façon dont le réalisateur filme."}],defi:{consigne:"Recommande (ou déconseille) un film ou livre que tu as vu/lu récemment. Explique pourquoi.",exemple:"Exemple : Je vous conseille vivement le film 'Le Fabuleux Destin d'Amélie Poulain'. L'intrigue est originale et la mise en scène est magnifique..."}},
    {id:"A2D2", title:"Les médias et l'information", lesson:{titre:"Parler de l'actualité",regle:"Pour discuter des médias et de l'actualité, il faut un vocabulaire adapté.",points:["Les médias : la presse écrite, la radio, la télévision, les réseaux sociaux","L'information : un article, une dépêche, un reportage, une enquête","Vérifier : une source fiable / les fake news / vérifier les informations","Exprimer : D'après les médias... / Selon les dernières nouvelles..."]},exos:[{type:"qcm",q:"'Je lis les _____ chaque matin sur mon téléphone.' (news)",opts:["actualités","actuals","journaux","nouvelles"],ans:0,exp:"'Les actualités' = the news. 'Les nouvelles' aussi s'utilise. 'Les journaux' = newspapers."},
    {type:"qcm",q:"'Il faut vérifier la _____ avant de partager un article.' (source)",opts:["source","ressource","origine","base"],ans:0,exp:"'La source' = the source. Vérifier la source = to check/verify the source."},
    {type:"qcm",q:"Une fake news est :",opts:["Une fausse information","Une nouvelle urgente","Un journal spécialisé","Une dépêche officielle"],ans:0,exp:"Une fake news = une fausse information, souvent diffusée intentionnellement."},
    {type:"blank",q:"D'après les _____, il va pleuvoir ce weekend. (forecasts/news)",ans:"prévisions",exp:"'Les prévisions' = forecasts. Les prévisions météo = weather forecast."},
    {type:"blank",q:"Ce journaliste fait des _____ sur la corruption. (investigations)",ans:"enquêtes",exp:"'Une enquête' = an investigation. Un journaliste d'enquête = investigative journalist."}],defi:{consigne:"Parle d'une actualité récente qui t'a intéressé(e). De quoi s'agit-il ? Quel est ton avis ?",exemple:"Exemple : Récemment, j'ai lu un article sur le changement climatique. Selon l'article..."}},
    {id:"A2D3", title:"La relative avec qui, que, dont, où", lesson:{titre:"Les pronoms relatifs",regle:"Les pronoms relatifs permettent de relier deux phrases pour éviter les répétitions.",points:["QUI = sujet : C'est l'acteur <strong>qui</strong> joue dans ce film.","QUE = complément d'objet : C'est le film <strong>que</strong> j'ai vu.","DONT = complément avec 'de' : C'est l'acteur <strong>dont</strong> je t'ai parlé.","OÙ = lieu ou temps : C'est la ville <strong>où</strong> je suis né(e)."]},exos:[{type:"qcm",q:"'C'est le livre _____ j'ai acheté hier.'",opts:["que","qui","dont","où"],ans:0,exp:"'Que' remplace le COD (complément d'objet direct). J'ai acheté le livre → le livre que j'ai acheté."},
    {type:"qcm",q:"'L'auteur _____ a écrit ce roman est célèbre.'",opts:["qui","que","dont","où"],ans:0,exp:"'Qui' remplace le sujet. L'auteur a écrit → l'auteur qui a écrit."},
    {type:"qcm",q:"'C'est un film _____ j'ai besoin de te parler.' (avoir besoin DE)",opts:["dont","que","qui","où"],ans:0,exp:"'Dont' remplace un complément introduit par 'de'. Parler DE ce film → dont je te parle."},
    {type:"blank",q:"Paris est la ville _____ j'ai grandi. (where)",ans:"où",exp:"'Où' = where (lieu). La ville où j'ai grandi = the city where I grew up."},
    {type:"blank",q:"C'est l'actrice _____ tout le monde connaît. (that)",ans:"que",exp:"'Que' remplace le COD. Tout le monde connaît cette actrice → l'actrice que tout le monde connaît."}],defi:{consigne:"Décris ton film ou livre préféré en utilisant les 4 pronoms relatifs (qui, que, dont, où).",exemple:"Exemple : Mon film préféré est un film qui se passe à Paris. C'est l'histoire que j'ai découverte il y a 5 ans..."}},
    {id:"A2D4", title:"Exprimer la cause et la conséquence", lesson:{titre:"Cause et conséquence",regle:"Pour construire des arguments solides, il faut maîtriser les expressions de cause et de conséquence.",points:["CAUSE : parce que / car / puisque / étant donné que / à cause de / grâce à","CONSÉQUENCE : donc / alors / c'est pourquoi / par conséquent / ainsi / du coup (familier)","Nuance : grâce à (positif) / à cause de (négatif ou neutre)","Exemple : Grâce à cet effort, il a réussi. / À cause de la pluie, on est restés."]},exos:[{type:"qcm",q:"'_____ son travail acharné, elle a obtenu une promotion.' (thanks to)",opts:["Grâce à","À cause de","Parce que","Car"],ans:0,exp:"'Grâce à' = thanks to. S'utilise pour une cause positive. Suivi d'un nom."},
    {type:"qcm",q:"'Il est arrivé en retard, _____ il a raté le début.' (so)",opts:["donc","parce que","grâce à","bien que"],ans:0,exp:"'Donc' = so/therefore. Introduit une conséquence logique."},
    {type:"qcm",q:"Quelle est la différence entre 'car' et 'parce que' ?",opts:["'Car' est plus soutenu, 'parce que' plus courant","Ce sont des synonymes exacts","'Car' = cause positive, 'parce que' = cause négative","'Car' commence une phrase, 'parce que' non"],ans:0,exp:"'Car' est légèrement plus formel/littéraire. 'Parce que' est plus courant à l'oral."},
    {type:"blank",q:"Il a oublié son parapluie, _____ il est tout mouillé ! (therefore)",ans:"c'est pourquoi",exp:"'C'est pourquoi' = that's why, therefore. Conséquence directe de l'oubli."},
    {type:"blank",q:"_____ la grève, le métro ne fonctionne pas. (because of)",ans:"À cause de",exp:"'À cause de' + nom = because of. Cause neutre ou négative (ici, c'est problématique)."}],defi:{consigne:"Explique 3 décisions importantes dans ta vie et leurs conséquences. Utilise grâce à, à cause de, donc, c'est pourquoi.",exemple:"Exemple : J'ai décidé d'apprendre le français. Grâce à cela, j'ai pu rencontrer de nouvelles personnes..."}},
    {id:"A2D5", title:"Le passé : plus-que-parfait (B1)", lesson:{titre:"Le plus-que-parfait",regle:"Le plus-que-parfait exprime une action passée AVANT une autre action passée. C'est le 'passé du passé'.",points:["Formation : AVOIR/ÊTRE à l'imparfait + participe passé","J'avais mangé / Elle était partie / Nous avions fini","Usage : Quand il est arrivé, j'avais déjà dîné. (dîner = avant l'arrivée)","Souvent avec : déjà, encore, quand, lorsque, avant que"]},exos:[{type:"qcm",q:"'Quand je suis arrivé, le film _____ déjà commencé.'",opts:["avait","a","avait eu","était"],ans:0,exp:"Plus-que-parfait de 'commencer' (avec avoir) → avait commencé. Action avant l'arrivée."},
    {type:"qcm",q:"'Elle _____ (partir) avant que j'arrive.'",opts:["était partie","a parti","était partis","avait parti"],ans:0,exp:"'Partir' utilise 'être' au plus-que-parfait → était partie. Accord féminin singulier."},
    {type:"qcm",q:"Lequel exprime le plus-que-parfait ?",opts:["Il avait déjà vu ce film.","Il a vu ce film.","Il voyait ce film.","Il verra ce film."],ans:0,exp:"'Avait vu' = plus-que-parfait. 'A vu' = passé composé. 'Voyait' = imparfait. 'Verra' = futur."},
    {type:"blank",q:"Lorsque la police est arrivée, le voleur _____ (s'enfuir) déjà.",ans:"s'était enfui",exp:"Plus-que-parfait pronominal de 's'enfuir' → s'était enfui. Action antérieure à l'arrivée."},
    {type:"blank",q:"J'ai remarqué que tu _____ (changer) de coiffure.",ans:"avais changé",exp:"Plus-que-parfait de 'changer' (avec avoir) → tu avais changé. Action avant le moment de remarquer."}],defi:{consigne:"Raconte une situation où tu es arrivé(e) trop tard ou trop tôt. Qu'avait-il déjà eu lieu ?",exemple:"Exemple : Quand je suis arrivé(e) à la fête, tout le monde était déjà parti. La musique s'était arrêtée et..."}},
    {id:"A2D6", title:"Nuancer et préciser sa pensée", lesson:{titre:"Exprimer des nuances",regle:"Pour parler comme un locuteur B1, il faut savoir nuancer ses propos et ne pas rester dans le manichéen (tout bon / tout mauvais).",points:["D'un côté... de l'autre / D'une part... d'autre part","Cela dit / Il faut nuancer / C'est plus complexe que ça","Certes... mais / Même si... quand même","Ça dépend (de) / Pas forcément / Pas nécessairement"]},exos:[{type:"qcm",q:"'D'un côté, c'est pratique. _____ l'autre, c'est cher.'",opts:["De","D'","Du","À"],ans:1,exp:"'D'un côté... de l'autre' = on one hand... on the other. 'De l'autre' avec élision → d'l'autre."},
    {type:"qcm",q:"'_____ c'est difficile, je vais quand même essayer.' (even if)",opts:["Même si","Bien que","Cependant","Certes"],ans:0,exp:"'Même si' + indicatif = even if. (Bien que → subjonctif, Même si → indicatif)"},
    {type:"qcm",q:"Pour nuancer une affirmation trop forte, on dit :",opts:["Il faut nuancer / Ce n'est pas si simple.","C'est exactement comme ça.","Absolument, sans exception.","C'est toujours vrai."],ans:0,exp:"'Il faut nuancer' = we need to be more nuanced. Expression clé pour éviter les généralités."},
    {type:"blank",q:"D'une _____, les études coûtent cher. D'autre part, elles ouvrent des portes.",ans:"part",exp:"'D'une part... d'autre part' = on one hand... on the other hand. Structure argumentative."},
    {type:"blank",q:"Ça _____ de la personne. Tout le monde est différent.",ans:"dépend",exp:"'Ça dépend de' = it depends on. Expression très utilisée pour nuancer."}],defi:{consigne:"Donne ton avis nuancé sur un sujet de ton choix. Utilise 'd'un côté... de l'autre' et au moins un autre connecteur de nuance.",exemple:"Exemple : Internet est un outil formidable. D'un côté, il nous donne accès à toute la connaissance. De l'autre, il peut..."}},
    {id:"A2D7", title:"Révision semaine 2 Août", lesson:{titre:"Bilan Août semaine 2",regle:"Cette semaine : parler de culture, les médias, les pronoms relatifs, cause/conséquence, le plus-que-parfait et nuancer.",points:["Pronoms : qui (sujet) / que (COD) / dont (complément de) / où (lieu/temps)","Plus-que-parfait : avais/était + participe passé → action avant une autre","Grâce à (positif) vs à cause de (neutre/négatif)","Nuancer : d'un côté... de l'autre / même si / certes... mais"]},exos:[{type:"qcm",q:"'C'est le film _____ tout le monde parle.' (dont/que/qui)",opts:["dont","que","qui","où"],ans:0,exp:"'Tout le monde parle DE ce film' → parler de = dont. C'est le film dont tout le monde parle."},
    {type:"qcm",q:"'Quand elle est revenue, il _____ déjà parti.' (plus-que-parfait)",opts:["était","a","avait","fut"],ans:0,exp:"'Partir' utilise 'être'. Plus-que-parfait = était parti. Accord masculin sing."},
    {type:"qcm",q:"'_____ la formation, il a trouvé un emploi.' (thanks to)",opts:["Grâce à","À cause de","Donc","Car"],ans:0,exp:"Résultat positif → 'grâce à'. Il a trouvé un emploi = bon résultat."},
    {type:"blank",q:"Certes, c'est difficile, _____ c'est possible.",ans:"mais",exp:"'Certes... mais' = admittedly... but. Structure de concession classique."},
    {type:"blank",q:"La ville _____ j'ai grandi s'appelle Casablanca. (where)",ans:"où",exp:"'Où' = pronom relatif de lieu (et de temps). La ville où j'ai grandi."}],defi:{consigne:"Écris une mini-critique (8 phrases) d'un film, livre ou série. Utilise les pronoms relatifs et exprime des nuances.",exemple:"Exemple : J'ai regardé une série qui m'a beaucoup intéressé(e). C'est une histoire dont les personnages sont..."}}
  ]
},
{
  id:"A3", month:"aout", num:3,
  title:"Société et environnement", theme:"Thème : Le monde qui nous entoure",
  days:[
    {id:"A3D1", title:"L'environnement", lesson:{titre:"Parler de l'écologie",regle:"Le vocabulaire de l'environnement est de plus en plus important dans la communication quotidienne.",points:["Les problèmes : le réchauffement climatique, la pollution, la déforestation, la sécheresse","Les solutions : le recyclage, les énergies renouvelables, réduire sa consommation","Verbes : recycler, économiser, préserver, protéger, polluer, consommer","Adjectifs : écologique, durable, renouvelable, biodégradable"]},exos:[{type:"qcm",q:"'Les énergies _____ n'émettent pas de CO2.' (renewable)",opts:["renouvelables","recyclables","durables","propres"],ans:0,exp:"'Renouvelable' = renewable. Les énergies renouvelables : solaire, éolien, hydraulique."},
    {type:"qcm",q:"Que signifie 'le réchauffement climatique' ?",opts:["L'augmentation de la température de la Terre","Un phénomène météorologique local","La fonte des glaces uniquement","La pollution de l'air"],ans:0,exp:"Le réchauffement climatique = global warming. Augmentation globale des températures terrestres."},
    {type:"qcm",q:"'Il faut _____ nos déchets pour protéger l'environnement.'",opts:["recycler","réutiliser","réduire","trier"],ans:3,exp:"'Trier ses déchets' = to sort waste. On trie d'abord (verre, papier, plastique...) puis on recycle."},
    {type:"blank",q:"Le _____ de l'eau est un problème mondial. (wastage/waste)",ans:"gaspillage",exp:"'Le gaspillage' = waste/wastage. Gaspiller de l'eau/de la nourriture = to waste water/food."},
    {type:"blank",q:"Nous devons _____ la biodiversité pour les générations futures.",ans:"préserver",exp:"'Préserver' = to preserve. Préserver la biodiversité = to preserve biodiversity."}],defi:{consigne:"Quels gestes écologiques fais-tu déjà ? Qu'est-ce que tu pourrais améliorer ? 5-6 phrases.",exemple:"Exemple : Je recycle mes déchets et j'utilise les transports en commun. Cependant, je pourrais aussi..."}},
    {id:"A3D2", title:"Les problèmes de société", lesson:{titre:"Parler des enjeux sociaux",regle:"Pour parler de société, il faut des mots pour décrire les problèmes et exprimer des solutions.",points:["Les inégalités, la pauvreté, le chômage, la discrimination, l'exclusion","La solidarité, l'entraide, l'égalité des chances, l'inclusion","Verbes : lutter contre, améliorer, soutenir, renforcer, sensibiliser","Structure : Il est nécessaire de + inf. / Il faudrait que + subjonctif"]},exos:[{type:"qcm",q:"'Lutter _____ les inégalités est une priorité.'",opts:["contre","pour","sur","avec"],ans:0,exp:"'Lutter contre' = to fight against. On lutte contre les problèmes, pas 'pour les inégalités'."},
    {type:"qcm",q:"Que signifie 'le chômage' ?",opts:["Le manque d'emploi","Le manque d'argent","Le manque de logement","Le manque de nourriture"],ans:0,exp:"Le chômage = unemployment. Les chômeurs sont des personnes sans emploi."},
    {type:"qcm",q:"'Il faudrait _____ davantage les populations vulnérables.' (to support)",opts:["soutenir","lutter","sensibiliser","exclure"],ans:0,exp:"'Soutenir' = to support. Soutenir les populations vulnérables = support vulnerable populations."},
    {type:"blank",q:"Il est nécessaire de _____ les gens à ces problèmes. (raise awareness)",ans:"sensibiliser",exp:"'Sensibiliser à' = to raise awareness about. Sensibiliser le public = make the public aware."},
    {type:"blank",q:"L'égalité des _____ est un droit fondamental. (opportunities)",ans:"chances",exp:"'L'égalité des chances' = equal opportunities. Principe fondamental des sociétés démocratiques."}],defi:{consigne:"Quel problème de société te préoccupe le plus ? Pourquoi et quelles solutions proposes-tu ?",exemple:"Exemple : Le problème qui me préoccupe le plus est l'inégalité. Je pense qu'il faudrait..."}},
    {id:"A3D3", title:"Le passif (B1)", lesson:{titre:"La voix passive",regle:"La voix passive met l'accent sur l'action et non sur celui qui agit.",points:["Formation : être (conjugué) + participe passé","Actif : Le gouvernement a adopté cette loi.","Passif : Cette loi a été adoptée par le gouvernement.","Agent (si mentionné) : + PAR → Cette loi a été adoptée PAR le gouvernement.","Le participe passé s'accorde avec le sujet du verbe passif."]},exos:[{type:"qcm",q:"'Ce roman _____ par des millions de lecteurs.' (lire, présent passif)",opts:["est lu","est lire","a lu","lit"],ans:0,exp:"Passif présent = est + participe passé. 'Lire' → lu. Ce roman est lu (par des millions)."},
    {type:"qcm",q:"Transforme : 'Le maire a inauguré le musée.'",opts:["Le musée a été inauguré par le maire.","Le musée est inauguré par le maire.","Le musée a inauguré le maire.","Le maire a été inauguré."],ans:0,exp:"Passé composé passif = a été + participe passé + par + l'agent → a été inauguré."},
    {type:"qcm",q:"'La décision _____ annoncée demain.' (will be)",opts:["sera","est","a été","avait été"],ans:0,exp:"Futur passif = sera + participe passé. La décision sera annoncée = will be announced."},
    {type:"blank",q:"Cette maison _____ construite en 1920. (was built — passé composé)",ans:"a été",exp:"Passé composé passif de 'construire' → a été construite. Accord féminin (maison)."},
    {type:"blank",q:"Les résultats seront _____ la semaine prochaine. (published)",ans:"publiés",exp:"Futur passif de 'publier' → seront publiés. Accord masculin pluriel (résultats)."}],defi:{consigne:"Réécris 3 phrases actives en phrases passives sur le thème de l'environnement.",exemple:"Exemple : Actif : Le gouvernement a adopté une loi. Passif : Une loi a été adoptée par le gouvernement."}},
    {id:"A3D4", title:"La politique et la citoyenneté", lesson:{titre:"Le vocabulaire civique",regle:"La vie civique et politique nécessite un vocabulaire spécifique pour comprendre et participer aux débats.",points:["Les institutions : le gouvernement, le parlement, la mairie, la préfecture","Les actions : voter, élire, manifester, pétitionner, débattre","Les droits : la liberté d'expression, le droit de vote, l'égalité devant la loi","Être citoyen(ne) : payer ses impôts, respecter les lois, participer à la vie démocratique"]},exos:[{type:"qcm",q:"'On va aux urnes pour _____.' (to vote)",opts:["voter","élire le président","manifester","pétitionner"],ans:0,exp:"'Les urnes' sont les boîtes dans lesquelles on met son bulletin de vote. Aller aux urnes = aller voter."},
    {type:"qcm",q:"La liberté d'expression est :",opts:["Le droit de dire ce qu'on pense","Le droit de ne pas travailler","Le droit de voyager","Le droit de ne pas payer d'impôts"],ans:0,exp:"La liberté d'expression = the right to free speech, to express one's opinions."},
    {type:"qcm",q:"'Les citoyens _____ pour protester contre la loi.' (are demonstrating)",opts:["manifestent","votent","élisent","pétitionnent"],ans:0,exp:"'Manifester' = to demonstrate (in the street). Une manifestation = a protest/march."},
    {type:"blank",q:"Tout le monde doit _____ ses impôts. (to pay)",ans:"payer",exp:"Payer ses impôts (taxes) est une obligation civique dans une société démocratique."},
    {type:"blank",q:"Le _____ de vote est un droit fondamental dans une démocratie.",ans:"droit",exp:"Le droit de vote = the right to vote. Obtenu par les femmes en France en 1944."}],defi:{consigne:"Es-tu un(e) citoyen(ne) actif(ve) ? Comment participes-tu à la vie de ta société ?",exemple:"Exemple : Je pense qu'être un bon citoyen, c'est voter aux élections et aussi..."}},
    {id:"A3D5", title:"Les relations humaines", lesson:{titre:"Parler des relations",regle:"Pour parler des relations humaines, il faut maîtriser un vocabulaire riche et nuancé.",points:["Relations : l'amitié, la confiance, le respect, la solidarité, la complicité","Conflits : un malentendru, une dispute, la jalousie, la rancœur","Résoudre : s'excuser, pardonner, se réconcilier, faire la paix","Verbes pronominaux : se disputer, se réconcilier, s'entendre (bien/mal) avec"]},exos:[{type:"qcm",q:"'Ils se sont _____ après leur dispute.' (made up/reconciled)",opts:["réconciliés","disputés","séparés","ignorés"],ans:0,exp:"'Se réconcilier' = to make up, to reconcile. Après une dispute, on peut se réconcilier."},
    {type:"qcm",q:"'Il y a eu un _____ entre nous.' (misunderstanding)",opts:["malentendu","conflit","différend","désaccord"],ans:0,exp:"'Un malentendu' = a misunderstanding. Quand on ne comprend pas ce que l'autre voulait dire."},
    {type:"qcm",q:"'Je m'_____ très bien avec ma collègue.' (get along)",opts:["entends","entends","vois","comprends"],ans:0,exp:"'S'entendre bien avec quelqu'un' = to get along well with someone."},
    {type:"blank",q:"Il lui a demandé _____ après leur dispute. (forgiveness)",ans:"pardon",exp:"'Demander pardon' = to apologize, to ask for forgiveness. 'Pardonner' = to forgive."},
    {type:"blank",q:"La _____ est la base de toute bonne relation. (trust)",ans:"confiance",exp:"'La confiance' = trust. 'Avoir confiance en quelqu'un' = to trust someone."}],defi:{consigne:"Décris une relation importante dans ta vie (ami(e), famille, collègue). Qu'est-ce qui la rend spéciale ?",exemple:"Exemple : Mon ami(e) le/la plus proche s'appelle... Notre amitié est basée sur la confiance et..."}},
    {id:"A3D6", title:"Bilan et auto-évaluation", lesson:{titre:"Évaluation de ton parcours",regle:"Nous arrivons à la fin de notre parcours de 62 jours ! Voici les notions clés de tout l'été.",points:["JUILLET A2 : articles, verbes -ER, passé composé, imparfait, conditionnel","AOÛT B1 : subjonctif, discours indirect, plus-que-parfait, passif, argumentation","Progrès : tu peux maintenant exprimer ton opinion, raconter le passé, argumenter et nuancer","Prochaine étape : lire des textes authentiques, regarder des films sans sous-titres, converser !"]},exos:[{type:"qcm",q:"'Je _____ que tu partes maintenant.' Quel verbe ? (vouloir + subjonctif)",opts:["veux","voudrais","voulais","veux que"],ans:3,exp:"'Je veux que' + subjonctif. L'expression complète = 'je veux que' → que tu partes."},
    {type:"qcm",q:"'Le projet _____ validé par le comité.' (passé composé passif)",opts:["a été","est","était","avait"],ans:0,exp:"Passé composé passif = a été + participe passé. Le projet a été validé."},
    {type:"qcm",q:"'Elle m'a dit qu'elle _____ fatiguée.' (discours indirect passé)",opts:["était","est","serait","soit"],ans:0,exp:"Discours indirect passé : présent → imparfait. 'Je suis' → elle était."},
    {type:"blank",q:"Quand je suis arrivé(e), il _____ déjà parti. (plus-que-parfait)",ans:"était",exp:"Plus-que-parfait de 'partir' (être) → était parti. Action antérieure à l'arrivée."},
    {type:"blank",q:"Grâce à cet été de travail, mon français s'est beaucoup _____!",ans:"amélioré",exp:"'S'améliorer' = to improve. Passé composé pronominal → s'est amélioré(e)."}],defi:{consigne:"Écris une lettre à toi-même dans 6 mois. Qu'est-ce que tu espères avoir accompli en français ?",exemple:"Exemple : Chère moi, Je t'écris depuis le mois d'août. Cet été, j'ai appris beaucoup de choses. Dans 6 mois, j'espère que..."}},
    {id:"A3D7", title:"Jour 62 — Grande Révision Finale", lesson:{titre:"Félicitations ! 62 jours accomplis.",regle:"Tu as terminé le Passeport Français Juillet-Août ! Voici les grands piliers que tu maîtrises maintenant.",points:["Grammaire A2 : articles, conjugaisons (présent, passé composé, imparfait, futur proche)","Grammaire B1 : conditionnel, subjonctif, passif, plus-que-parfait, discours indirect","Vocabulaire : quotidien, voyages, nourriture, travail, santé, société, culture","Communication : donner son avis, argumenter, nuancer, raconter, décrire"]},exos:[{type:"qcm",q:"Laquelle est une phrase au subjonctif ?",opts:["Bien qu'il soit tard, je continue.","Il est tard.","Il était tard.","Il sera tard."],ans:0,exp:"'Bien que' + subjonctif → bien qu'il soit tard. 'Soit' = subjonctif de 'être'."},
    {type:"qcm",q:"'Si j'avais su, j'_____ (venir) plus tôt.' (conditionnel passé)",opts:["serais venu(e)","serai venu","venais","suis venu"],ans:0,exp:"Condition hypothétique passée : si + plus-que-parfait → conditionnel passé → serais venu(e)."},
    {type:"qcm",q:"Quelle phrase est au passif ?",opts:["Ce livre a été écrit en 1960.","J'ai écrit ce livre.","Il écrit ce livre.","Il allait écrire ce livre."],ans:0,exp:"Passif = être + participe passé. 'A été écrit' = passé composé passif."},
    {type:"blank",q:"Elle m'a demandé si je _____ (vouloir) l'accompagner. (discours indirect)",ans:"voulais",exp:"Discours indirect passé : présent → imparfait. 'Tu veux' → si je voulais."},
    {type:"blank",q:"D'une _____, c'est difficile. D'autre part, c'est enrichissant.",ans:"part",exp:"'D'une part... d'autre part' = on one hand... on the other. Structure de nuance."}],defi:{consigne:"Écris un texte libre de 10-15 phrases sur ce que cet été t'a apporté. Utilise le maximum de structures apprises !",exemple:"Exemple : Cet été, j'ai beaucoup travaillé mon français. Au début, je ne savais pas bien utiliser le subjonctif, mais maintenant..."}}
  ]
}
];

/* ════════════════════════════════
   ÉTAT DE L'APP
════════════════════════════════ */
let progress = JSON.parse(localStorage.getItem('pfprogress') || '{}');
let currentWeek = null;
let currentDay = null;
let currentStep = 0; // 0=lecon 1=exos 2=defi 3=result
let exoResults = {};

function save() {
  localStorage.setItem('pfprogress', JSON.stringify(progress));
  updateHomeStats();
}

/* ════════════════════════════════
   NAVIGATION
════════════════════════════════ */
function showHome() {
  document.getElementById('screen-home').style.display = 'block';
  document.getElementById('screen-week').style.display = 'none';
  document.getElementById('screen-lesson').style.display = 'none';
  renderAllWeeks();
  updateHomeStats();
}

function showMonth(m) {
  // Scroll to weeks section filtered by month
  renderAllWeeks(m);
  document.querySelector('.weeks-section h2').textContent =
    m === 'juillet' ? 'Semaines de Juillet' : 'Semaines d\'Août';
}

function showWeek(weekId) {
  currentWeek = weekId;
  const week = CURRICULUM.find(w => w.id === weekId);
  document.getElementById('screen-home').style.display = 'none';
  document.getElementById('screen-week').style.display = 'block';
  document.getElementById('screen-lesson').style.display = 'none';

  document.getElementById('w-eyebrow').textContent =
    (week.month === 'juillet' ? 'Juillet' : 'Août') + ' · Semaine ' + week.num;
  document.getElementById('w-title').textContent = week.title;
  document.getElementById('w-theme').textContent = week.theme;

  const grid = document.getElementById('days-grid');
  grid.innerHTML = '';
  week.days.forEach((day, i) => {
    const done = progress[day.id];
    const div = document.createElement('div');
    div.className = 'day-row' + (done ? ' done' : '');
    div.innerHTML = `
      <div class="day-num">${i + 1}</div>
      <div class="day-info">
        <div class="day-title">${day.title}</div>
        <div class="day-blocks">Leçon · Exercices · Défi</div>
      </div>
      <div class="day-status">${done ? '✓ ' + done + '/5' : '→'}</div>
    `;
    div.onclick = () => startDay(weekId, day.id);
    grid.appendChild(div);
  });
}

function startDay(weekId, dayId) {
  currentWeek = weekId;
  const week = CURRICULUM.find(w => w.id === weekId);
  currentDay = week.days.find(d => d.id === dayId);
  currentStep = 0;
  exoResults = {};
  document.getElementById('screen-home').style.display = 'none';
  document.getElementById('screen-week').style.display = 'none';
  document.getElementById('screen-lesson').style.display = 'block';
  renderStep();
}

/* ════════════════════════════════
   RENDU DE LA LEÇON
════════════════════════════════ */
function renderStep() {
  const day = currentDay;
  const meta = document.getElementById('lesson-meta');
  meta.textContent = day.title;

  // Step indicators
  const ind = document.getElementById('step-indicators');
  ind.innerHTML = ['Leçon', 'Exercices', 'Défi', 'Bilan'].map((s, i) =>
    `<div class="step-dot ${i < currentStep ? 'done-step' : i === currentStep ? 'active' : ''}" title="${s}"></div>`
  ).join('');

  const content = document.getElementById('lesson-content');
  content.innerHTML = '';

  if (currentStep === 0) renderLecon(content, day);
  else if (currentStep === 1) renderExos(content, day);
  else if (currentStep === 2) renderDefi(content, day);
  else renderResult(content, day);
}

function renderLecon(container, day) {
  const l = day.lesson;
  container.innerHTML = `
    <div class="lesson-block">
      <div class="block-tag tag-lecon"><div class="tag-dot"></div> Leçon du jour</div>
      <div class="lesson-title">${l.titre}</div>
      <div class="lesson-rule">${l.regle}</div>
      <div class="lesson-examples">
        ${l.points.map(p => `<div class="example-item">• ${p}</div>`).join('')}
      </div>
    </div>
    <div class="lesson-nav">
      <button class="btn-nav" onclick="showWeek(currentWeek)">← Retour</button>
      <span class="score-display">Étape 1/4</span>
      <button class="btn-nav primary" onclick="nextStep()">Exercices →</button>
    </div>`;
}

function renderExos(container, day) {
  const exoHtml = day.exos.map((e, i) => {
    if (e.type === 'qcm') {
      return `<div class="exo-item">
        <div class="exo-q"><strong>Q${i+1}.</strong> ${e.q}</div>
        <div class="exo-opts">
          ${e.opts.map((o, j) => `<div class="exo-opt" id="opt-${i}-${j}" onclick="selectOpt(${i},${j})">\
<span class="opt-letter">${'ABCD'[j]}</span>${o}</div>`).join('')}
        </div>
        <div class="exo-feedback" id="fb-${i}"></div>
      </div>`;
    } else {
      return `<div class="exo-item">
        <div class="exo-q"><strong>Q${i+1}.</strong> ${e.q}</div>
        <div class="exo-blank">
          <input type="text" id="inp-${i}" placeholder="Écris ta réponse..." onkeyup="if(event.key==='Enter')checkBlank(${i})">
          <button class="check-btn" onclick="checkBlank(${i})">Vérifier</button>
        </div>
        <div class="exo-feedback" id="fb-${i}"></div>
      </div>`;
    }
  }).join('');

  container.innerHTML = `
    <div class="lesson-block">
      <div class="block-tag tag-exercice"><div class="tag-dot"></div> Exercices</div>
      <div class="exo-list">${exoHtml}</div>
    </div>
    <div class="lesson-nav">
      <button class="btn-nav" onclick="prevStep()">← Leçon</button>
      <span class="score-display" id="exo-score">0/${day.exos.length}</span>
      <button class="btn-nav primary" id="to-defi-btn" onclick="nextStep()">Défi →</button>
    </div>`;
}

function selectOpt(qi, oi) {
  const day = currentDay;
  const e = day.exos[qi];
  if (exoResults[qi] !== undefined) return;

  ['A','B','C','D'].forEach((_, j) => {
    const el = document.getElementById(`opt-${qi}-${j}`);
    if (el) el.classList.remove('selected','correct','wrong');
  });

  const selected = document.getElementById(`opt-${qi}-${oi}`);
  if (oi === e.ans) {
    selected.classList.add('correct');
    exoResults[qi] = true;
  } else {
    selected.classList.add('wrong');
    document.getElementById(`opt-${qi}-${e.ans}`)?.classList.add('correct');
    exoResults[qi] = false;
  }
  const fb = document.getElementById(`fb-${qi}`);
  fb.textContent = (oi === e.ans ? '✓ ' : '✗ ') + e.exp;
  fb.className = 'exo-feedback show ' + (oi === e.ans ? 'ok' : 'ko');
  updateExoScore();
}

function checkBlank(qi) {
  const day = currentDay;
  const e = day.exos[qi];
  const inp = document.getElementById(`inp-${qi}`);
  if (!inp || exoResults[qi] !== undefined) return;
  const val = inp.value.trim().toLowerCase();
  const correct = e.ans.toLowerCase();
  const ok = val === correct || val.replace(/['']/g,"'") === correct.replace(/['']/g,"'");
  inp.className = ok ? 'correct' : 'wrong';
  exoResults[qi] = ok;
  const fb = document.getElementById(`fb-${qi}`);
  fb.textContent = ok ? '✓ ' + e.exp : `✗ Réponse attendue : "${e.ans}" — ${e.exp}`;
  fb.className = 'exo-feedback show ' + (ok ? 'ok' : 'ko');
  updateExoScore();
}

function updateExoScore() {
  const day = currentDay;
  const done = Object.keys(exoResults).length;
  const good = Object.values(exoResults).filter(Boolean).length;
  const sc = document.getElementById('exo-score');
  if (sc) sc.textContent = `${good}/${day.exos.length}`;
}

function renderDefi(container, day) {
  const d = day.defi;
  container.innerHTML = `
    <div class="lesson-block">
      <div class="block-tag tag-defi"><div class="tag-dot"></div> Défi du jour</div>
      <div class="lesson-title">À toi de jouer !</div>
      <div class="defi-hint">💡 ${d.exemple}</div>
      <p style="font-size:14px;color:var(--encre-doux);margin-bottom:12px;line-height:1.6;">${d.consigne}</p>
      <textarea class="defi-zone" id="defi-text" placeholder="Écris ici..."></textarea>
    </div>
    <div class="lesson-nav">
      <button class="btn-nav" onclick="prevStep()">← Exercices</button>
      <span class="score-display">Étape 3/4</span>
      <button class="btn-nav success" onclick="finishDay()">Terminer ✓</button>
    </div>`;
}

function renderResult(container, day) {
  const total = Object.values(exoResults).filter(Boolean).length;
  const max = day.exos.length;
  const pct = Math.round(total/max*100);
  const stars = pct >= 80 ? '⭐⭐⭐' : pct >= 60 ? '⭐⭐' : '⭐';
  const msg = pct >= 80 ? 'Excellent travail !' : pct >= 60 ? 'Bien joué !' : 'Continue comme ça !';
  const emoji = pct >= 80 ? '🎉' : pct >= 60 ? '😊' : '💪';

  container.innerHTML = `
    <div class="lesson-block result-day">
      <div class="big-emoji">${emoji}</div>
      <h3>${msg}</h3>
      <div class="stars">${stars}</div>
      <div class="result-score" style="color:${pct>=80?'var(--vert)':pct>=60?'var(--jul)':'var(--aout)'}">${total}<span style="font-size:20px;color:var(--encre-doux);">/${max}</span></div>
      <div class="score-detail">Journée complétée · ${pct}% aux exercices</div>
    </div>
    <div class="lesson-nav">
      <button class="btn-nav" onclick="showWeek(currentWeek)">← Semaine</button>
      <button class="btn-nav primary" onclick="showHome()">Accueil</button>
    </div>`;
}

function nextStep() { currentStep++; renderStep(); }
function prevStep() { currentStep--; renderStep(); }

function finishDay() {
  const total = Object.values(exoResults).filter(Boolean).length;
  progress[currentDay.id] = total;
  save();
  currentStep = 3;
  renderStep();
}

/* ════════════════════════════════
   HOME — STATS ET LISTE
════════════════════════════════ */
function updateHomeStats() {
  const julWeeks = CURRICULUM.filter(w => w.month === 'juillet');
  const aoutWeeks = CURRICULUM.filter(w => w.month === 'aout');
  const allJulDays = julWeeks.flatMap(w => w.days);
  const allAoutDays = aoutWeeks.flatMap(w => w.days);
  const julDone = allJulDays.filter(d => progress[d.id] !== undefined).length;
  const aoutDone = allAoutDays.filter(d => progress[d.id] !== undefined).length;

  document.getElementById('prog-juillet').style.width = (julDone/31*100) + '%';
  document.getElementById('prog-aout').style.width = (aoutDone/31*100) + '%';
  document.getElementById('done-juillet').textContent = `${julDone} / 31 jours`;
  document.getElementById('done-aout').textContent = `${aoutDone} / 31 jours`;
}

function renderAllWeeks(filterMonth) {
  const list = document.getElementById('all-weeks-list');
  list.innerHTML = '';
  const weeks = filterMonth ? CURRICULUM.filter(w => w.month === filterMonth) : CURRICULUM;
  weeks.forEach(w => {
    const allDone = w.days.filter(d => progress[d.id] !== undefined).length;
    const isJul = w.month === 'juillet';
    const div = document.createElement('div');
    div.className = 'week-row' + (allDone === 7 ? '' : '');
    const dotsHtml = w.days.map((d, i) =>
      `<div class="week-day-dot ${progress[d.id] !== undefined ? 'done' : ''}"></div>`
    ).join('');
    div.innerHTML = `
      <div class="week-dot ${isJul ? 'juillet' : 'aout'} ${allDone===7?'done':''}">${w.num}</div>
      <div class="week-info">
        <div class="week-name">${w.title}</div>
        <div class="week-theme">${w.theme}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
        <div class="week-days">${dotsHtml}</div>
        <div class="week-score" style="font-size:11px;color:var(--encre-doux);">${allDone}/7</div>
      </div>`;
    div.onclick = () => showWeek(w.id);
    list.appendChild(div);
  });
  document.querySelector('.weeks-section h2').textContent = 'Toutes les semaines';
}

// INIT
showHome();
</script>

</html>
