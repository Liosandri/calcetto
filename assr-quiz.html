<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASSR – Questionnaire Bilingue FR/VI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Baloo+2:wght@700;800&display=swap');

  :root {
    --red:    #E8003D;
    --yellow: #F5C400;
    --navy:   #0B1F4A;
    --sky:    #E8F3FF;
    --white:  #FFFFFF;
    --gray:   #F0F2F5;
    --text:   #1A1A2E;
    --muted:  #6B7280;
    --green:  #16A34A;
    --wrong:  #DC2626;
    --radius: 14px;
    --shadow: 0 4px 24px rgba(11,31,74,.10);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(160deg, #0B1F4A 0%, #1a3a7a 40%, #0B1F4A 100%);
    min-height: 100vh;
    color: var(--text);
    padding: 16px;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    padding: 32px 20px 24px;
    color: white;
  }
  .header .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--red);
    color: white;
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    padding: 6px 14px; border-radius: 99px;
    margin-bottom: 16px;
  }
  .flag { font-size: 18px; }
  .header h1 {
    font-family: 'Baloo 2', cursive;
    font-size: clamp(26px, 5vw, 44px);
    font-weight: 800;
    line-height: 1.1;
    color: white;
  }
  .header h1 span { color: var(--yellow); }
  .header p { margin-top: 8px; color: rgba(255,255,255,.65); font-size: 14px; }

  /* ── STATS BAR ── */
  .stats {
    display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;
    margin: 0 auto 24px;
    max-width: 680px;
  }
  .stat-pill {
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.18);
    color: white;
    border-radius: 99px;
    padding: 8px 18px;
    font-size: 13px; font-weight: 600;
    display: flex; align-items: center; gap: 6px;
  }
  .stat-pill .num { font-size: 18px; font-weight: 800; color: var(--yellow); }

  /* ── PROGRESS ── */
  .progress-wrap {
    max-width: 680px; margin: 0 auto 20px;
    background: rgba(255,255,255,.15);
    border-radius: 99px; height: 8px; overflow: hidden;
  }
  .progress-bar {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, var(--yellow), #FF7A00);
    transition: width .4s ease;
  }

  /* ── CARD ── */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    max-width: 680px;
    margin: 0 auto 20px;
    overflow: hidden;
  }

  .card-head {
    background: var(--navy);
    padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-head .qnum {
    font-size: 12px; font-weight: 700; letter-spacing: 1px;
    color: var(--yellow); text-transform: uppercase;
  }
  .card-head .theme-tag {
    background: rgba(255,255,255,.12);
    color: rgba(255,255,255,.8);
    font-size: 11px; font-weight: 600;
    padding: 4px 10px; border-radius: 99px;
  }

  .card-body { padding: 22px 22px 18px; }

  .question-fr {
    font-size: 16px; font-weight: 600; line-height: 1.5;
    color: var(--navy); margin-bottom: 6px;
  }
  .question-vi {
    font-size: 13px; color: var(--muted); line-height: 1.5;
    margin-bottom: 18px;
    padding: 8px 12px;
    background: var(--gray);
    border-radius: 8px;
    border-left: 3px solid var(--red);
  }
  .question-vi::before { content: "🇻🇳 "; }

  /* ── ILLUSTRATION ── */
  .illus-wrap {
    margin-bottom: 18px;
    border-radius: 10px; overflow: hidden;
    background: var(--sky);
    display: flex; align-items: center; justify-content: center;
    min-height: 110px;
    position: relative;
  }
  .illus-wrap svg { display: block; }
  .illus-wrap .illus-label {
    position: absolute; bottom: 8px; right: 10px;
    font-size: 10px; color: var(--muted); font-weight: 500;
  }

  /* ── OPTIONS ── */
  .options { display: grid; gap: 10px; }

  .option {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 14px;
    border: 2px solid #E5E7EB;
    border-radius: 10px;
    cursor: pointer;
    transition: border-color .2s, background .2s, transform .1s;
    background: white;
    text-align: left;
    width: 100%;
    font-family: inherit;
  }
  .option:hover { border-color: var(--navy); background: var(--sky); }
  .option.selected { border-color: var(--navy); background: var(--sky); }
  .option.correct  { border-color: var(--green); background: #F0FDF4; }
  .option.wrong    { border-color: var(--wrong); background: #FEF2F2; }

  .opt-letter {
    width: 28px; height: 28px; min-width: 28px;
    border-radius: 50%;
    background: var(--gray);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--navy);
    transition: background .2s, color .2s;
  }
  .option.correct .opt-letter { background: var(--green); color: white; }
  .option.wrong   .opt-letter { background: var(--wrong); color: white; }

  .opt-text { flex: 1; }
  .opt-text .fr { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.4; }
  .opt-text .vi { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.4; }

  /* ── EXPLANATION ── */
  .explanation {
    margin-top: 16px;
    padding: 12px 14px;
    background: #F0FDF4;
    border-radius: 8px;
    border-left: 3px solid var(--green);
    display: none;
  }
  .explanation.visible { display: block; }
  .explanation .exp-fr { font-size: 13px; color: #166534; font-weight: 500; line-height: 1.5; }
  .explanation .exp-vi { font-size: 12px; color: #4ADE80; margin-top: 4px; line-height: 1.5; }

  /* ── BUTTONS ── */
  .btn-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }

  .btn {
    padding: 10px 22px; border-radius: 8px; font-size: 14px; font-weight: 600;
    border: none; cursor: pointer; transition: transform .1s, opacity .2s;
    font-family: inherit;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--navy); color: white; }
  .btn-primary:hover { background: #162d68; }
  .btn-primary:disabled { opacity: .4; cursor: default; }
  .btn-validate { background: var(--red); color: white; }
  .btn-validate:hover { background: #c5002f; }
  .btn-validate:disabled { opacity: .4; cursor: default; }

  /* ── LOADING ── */
  .loading-card {
    background: white;
    border-radius: var(--radius);
    max-width: 680px;
    margin: 0 auto;
    padding: 60px 40px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid var(--gray);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-card p { color: var(--muted); font-size: 14px; }
  .loading-card .load-vi { font-size: 12px; color: #9CA3AF; margin-top: 4px; }

  /* ── RESULTS ── */
  .results {
    background: white;
    border-radius: var(--radius);
    max-width: 680px;
    margin: 0 auto;
    padding: 40px 30px;
    text-align: center;
    box-shadow: var(--shadow);
    display: none;
  }
  .results.visible { display: block; }
  .results .score-circle {
    width: 120px; height: 120px;
    border-radius: 50%;
    margin: 0 auto 20px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Baloo 2', cursive;
    font-size: 36px; font-weight: 800;
    color: white;
  }
  .results .score-circle .score-label { font-size: 12px; font-weight: 600; margin-top: -4px; }
  .results h2 { font-size: 22px; font-weight: 800; color: var(--navy); margin-bottom: 6px; }
  .results p { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
  .results .btn-restart { background: var(--navy); color: white; padding: 12px 32px; border-radius: 10px; font-size: 15px; font-weight: 700; border: none; cursor: pointer; font-family: inherit; }

  /* ── FILTER TABS ── */
  .filters {
    max-width: 680px; margin: 0 auto 16px;
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .filter-btn {
    padding: 7px 14px; border-radius: 99px;
    font-size: 12px; font-weight: 600;
    border: 2px solid rgba(255,255,255,.3);
    background: transparent; color: rgba(255,255,255,.7);
    cursor: pointer; transition: all .2s; font-family: inherit;
  }
  .filter-btn.active { background: var(--yellow); border-color: var(--yellow); color: var(--navy); }

  /* ── MOBILE ── */
  @media (max-width: 480px) {
    body { padding: 10px; }
    .card-body { padding: 16px; }
    .btn-row { flex-direction: column-reverse; }
    .btn { width: 100%; text-align: center; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="badge"><span class="flag">🇫🇷</span> ASSR / Code 50cc <span class="flag">🇻🇳</span></div>
  <h1>Questionnaire <span>Bilingue</span></h1>
  <p>Préparation au permis AM / BSR – Français &amp; Tiếng Việt</p>
</div>

<div class="stats" id="statsBar">
  <div class="stat-pill">Questions : <span class="num" id="statTotal">–</span></div>
  <div class="stat-pill">✅ Bonnes : <span class="num" id="statGood">0</span></div>
  <div class="stat-pill">❌ Erreurs : <span class="num" id="statWrong">0</span></div>
</div>

<div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

<div class="filters" id="filtersRow">
  <button class="filter-btn active" onclick="setFilter('all',this)">🗂️ Tout / Tất cả</button>
  <button class="filter-btn" onclick="setFilter('priorite',this)">⛔ Priorité</button>
  <button class="filter-btn" onclick="setFilter('signalisation',this)">🚦 Signalisation</button>
  <button class="filter-btn" onclick="setFilter('alcool',this)">🍺 Alcool / Drogues</button>
  <button class="filter-btn" onclick="setFilter('securite',this)">🪖 Sécurité</button>
  <button class="filter-btn" onclick="setFilter('conduite',this)">🛵 Conduite</button>
</div>

<div id="quizArea"></div>
<div class="results" id="resultsBox">
  <div class="score-circle" id="scoreCircle">
    <span id="scorePct">–</span>
    <span class="score-label">score</span>
  </div>
  <h2 id="resultTitle">–</h2>
  <p id="resultMsg">–</p>
  <button class="btn-restart" onclick="restart()">🔄 Recommencer / Làm lại</button>
</div>

<script>
// ════════════════════════════════════════════════
// QUESTION BANK – 100 questions ASSR / Code 50cc
// Each: { id, theme, fr, vi, illus, options:[{fr,vi}], answer(0-based), expFr, expVi }
// ════════════════════════════════════════════════
const ALL_QUESTIONS = [
  // ── PRIORITÉ ──────────────────────────────────
  {id:1,theme:"priorite",
   fr:"À une intersection sans signalisation, vous venez de la droite d'un autre véhicule. Qui est prioritaire ?",
   vi:"Tại ngã tư không có biển báo, bạn đến từ bên phải xe khác. Ai được ưu tiên ?",
   illus:"crossroad-right",
   options:[
     {fr:"Vous, car vous venez de la droite",vi:"Bạn, vì bạn đến từ bên phải"},
     {fr:"L'autre véhicule, car il est plus grand",vi:"Xe kia, vì xe to hơn"},
     {fr:"Celui qui roule le plus vite",vi:"Người đi nhanh hơn"},
   ],answer:0,
   expFr:"Règle de priorité à droite : sans autre signalisation, le véhicule venant de la droite est prioritaire.",
   expVi:"Quy tắc ưu tiên bên phải: khi không có biển báo, xe từ bên phải được ưu tiên."},

  {id:2,theme:"priorite",
   fr:"Que signifie un panneau 'Cédez le passage' (triangle pointe en bas) ?",
   vi:"Biển 'Nhường đường' (tam giác ngược) có nghĩa là gì ?",
   illus:"cedez-passage",
   options:[
     {fr:"Vous devez vous arrêter complètement",vi:"Bạn phải dừng hẳn"},
     {fr:"Vous devez laisser passer les usagers venant d'autres directions",vi:"Bạn nhường đường cho xe từ hướng khác"},
     {fr:"Vous avez la priorité",vi:"Bạn được ưu tiên"},
   ],answer:1,
   expFr:"Le panneau 'Cédez le passage' impose de laisser passer les autres sans s'arrêter obligatoirement.",
   expVi:"Biển 'Nhường đường' yêu cầu nhường xe khác nhưng không bắt buộc dừng hẳn."},

  {id:3,theme:"priorite",
   fr:"Qu'impose le panneau 'Stop' ?",
   vi:"Biển 'Stop' yêu cầu gì ?",
   illus:"stop-sign",
   options:[
     {fr:"Ralentir sans s'arrêter",vi:"Giảm tốc không cần dừng"},
     {fr:"S'arrêter obligatoirement avant la ligne d'arrêt",vi:"Bắt buộc dừng xe trước vạch dừng"},
     {fr:"Klaxonner avant de passer",vi:"Bấm còi trước khi qua"},
   ],answer:1,
   expFr:"Le Stop impose un arrêt complet, même en l'absence de tout autre usager.",
   expVi:"Biển Stop bắt buộc dừng hoàn toàn dù không có xe khác."},

  {id:4,theme:"priorite",
   fr:"Sur une route à sens unique, qui a la priorité à une intersection ?",
   vi:"Trên đường một chiều, ai được ưu tiên tại ngã tư ?",
   illus:"one-way",
   options:[
     {fr:"La priorité à droite s'applique normalement",vi:"Quy tắc ưu tiên bên phải vẫn áp dụng"},
     {fr:"Le véhicule le plus lourd",vi:"Xe nặng hơn"},
     {fr:"Celui qui klaxonne en premier",vi:"Người bấm còi trước"},
   ],answer:0,
   expFr:"La priorité à droite s'applique sur les routes à sens unique comme sur les routes normales.",
   expVi:"Quy tắc ưu tiên bên phải vẫn áp dụng trên đường một chiều."},

  {id:5,theme:"priorite",
   fr:"Un véhicule se trouve sur une route prioritaire (panneau passage protégé). Qui cède le passage ?",
   vi:"Một xe trên đường ưu tiên (biển đường ưu tiên). Ai phải nhường ?",
   illus:"route-prioritaire",
   options:[
     {fr:"Le véhicule sur la route prioritaire",vi:"Xe trên đường ưu tiên"},
     {fr:"Vous, qui arrivez sur la route prioritaire",vi:"Bạn, đang vào đường ưu tiên"},
     {fr:"Les deux doivent s'arrêter",vi:"Cả hai phải dừng"},
   ],answer:1,
   expFr:"Sur une route à passage protégé, les véhicules arrivant doivent céder le passage.",
   expVi:"Trên đường ưu tiên, xe đến phải nhường đường cho xe đang đi trên đường đó."},

  // ── SIGNALISATION ──────────────────────────────
  {id:6,theme:"signalisation",
   fr:"Que signifie un feu tricolore rouge ?",
   vi:"Đèn giao thông đỏ có nghĩa là gì ?",
   illus:"feu-rouge",
   options:[
     {fr:"Ralentir",vi:"Giảm tốc"},
     {fr:"S'arrêter obligatoirement",vi:"Bắt buộc dừng lại"},
     {fr:"Passer si la voie est libre",vi:"Đi nếu đường trống"},
   ],answer:1,
   expFr:"Le feu rouge impose l'arrêt total. Le franchir est une infraction grave.",
   expVi:"Đèn đỏ bắt buộc dừng hoàn toàn. Vượt đèn đỏ là vi phạm nghiêm trọng."},

  {id:7,theme:"signalisation",
   fr:"Que signifie le feu orange (jaune) fixe ?",
   vi:"Đèn vàng liên tục có nghĩa là gì ?",
   illus:"feu-orange",
   options:[
     {fr:"Accélérer pour passer avant le rouge",vi:"Tăng tốc để qua trước khi đèn đỏ"},
     {fr:"Ralentir et s'apprêter à s'arrêter",vi:"Giảm tốc và chuẩn bị dừng"},
     {fr:"Continuer normalement",vi:"Tiếp tục bình thường"},
   ],answer:1,
   expFr:"Le feu orange signale l'imminence du rouge. Il faut ralentir et s'arrêter sauf si c'est impossible sans danger.",
   expVi:"Đèn vàng báo hiệu sắp chuyển đỏ. Cần giảm tốc và dừng trừ khi không thể an toàn."},

  {id:8,theme:"signalisation",
   fr:"Quelle est la signification d'une ligne blanche continue au centre de la route ?",
   vi:"Vạch trắng liên tục ở giữa đường có nghĩa gì ?",
   illus:"ligne-continue",
   options:[
     {fr:"Interdiction de franchir ou de dépasser",vi:"Cấm vượt qua hoặc vượt xe"},
     {fr:"Vous pouvez doubler en étant prudent",vi:"Có thể vượt khi cẩn thận"},
     {fr:"Zone de stationnement autorisé",vi:"Được phép đỗ xe"},
   ],answer:0,
   expFr:"La ligne blanche continue est infranchissable : il est interdit de la traverser pour doubler ou tourner.",
   expVi:"Vạch liên tục không được phép vượt qua: cấm vượt xe hoặc rẽ qua vạch."},

  {id:9,theme:"signalisation",
   fr:"Que signifie ce panneau : un triangle rouge avec un point d'exclamation ?",
   vi:"Biển tam giác đỏ có dấu chấm than có nghĩa gì ?",
   illus:"danger-generic",
   options:[
     {fr:"Danger non précisé – soyez vigilant",vi:"Nguy hiểm không xác định – hãy cẩn thận"},
     {fr:"Interdiction de doubler",vi:"Cấm vượt xe"},
     {fr:"Péage à venir",vi:"Sắp đến trạm thu phí"},
   ],answer:0,
   expFr:"Le triangle avec point d'exclamation signale un danger quelconque non identifié. Prudence accrue.",
   expVi:"Biển tam giác với dấu chấm than báo nguy hiểm chung. Cần đặc biệt chú ý."},

  {id:10,theme:"signalisation",
   fr:"Un panneau rond bleu avec une flèche vers le haut indique :",
   vi:"Biển tròn xanh dương với mũi tên hướng lên có nghĩa :",
   illus:"sens-obligatoire",
   options:[
     {fr:"Sens interdit",vi:"Cấm đi"},
     {fr:"Sens obligatoire – vous devez avancer tout droit",vi:"Chiều đi bắt buộc – phải đi thẳng"},
     {fr:"Voie réservée aux vélos",vi:"Làn dành cho xe đạp"},
   ],answer:1,
   expFr:"Les panneaux ronds bleus sont des panneaux d'obligation. Une flèche vers le haut = aller tout droit.",
   expVi:"Biển tròn xanh là biển bắt buộc. Mũi tên hướng lên = bắt buộc đi thẳng."},

  {id:11,theme:"signalisation",
   fr:"Que signifie une ligne blanche discontinue (pointillés) au centre ?",
   vi:"Vạch trắng đứt đoạn (chấm) ở giữa đường có nghĩa gì ?",
   illus:"ligne-discontinue",
   options:[
     {fr:"Interdiction de doubler dans tous les cas",vi:"Cấm vượt xe trong mọi trường hợp"},
     {fr:"Vous pouvez doubler si la visibilité est bonne",vi:"Được phép vượt xe nếu tầm nhìn tốt"},
     {fr:"Voie à sens unique",vi:"Đường một chiều"},
   ],answer:1,
   expFr:"La ligne discontinue autorise le dépassement si les conditions sont réunies (visibilité, sécurité).",
   expVi:"Vạch đứt đoạn cho phép vượt xe nếu đủ điều kiện (tầm nhìn, an toàn)."},

  {id:12,theme:"signalisation",
   fr:"Un panneau rond rouge avec une barre blanche horizontale signifie :",
   vi:"Biển tròn đỏ với thanh ngang trắng có nghĩa :",
   illus:"sens-interdit",
   options:[
     {fr:"Vitesse limitée à 30 km/h",vi:"Giới hạn tốc độ 30 km/h"},
     {fr:"Sens interdit",vi:"Cấm đi vào"},
     {fr:"Stationnement interdit",vi:"Cấm đỗ xe"},
   ],answer:1,
   expFr:"Ce panneau est le 'Sens interdit'. Il interdit l'accès à une voie dans ce sens.",
   expVi:"Đây là biển 'Cấm đi vào'. Cấm vào đường theo chiều đó."},

  {id:13,theme:"signalisation",
   fr:"Quelle couleur ont les panneaux d'interdiction ?",
   vi:"Biển cấm có màu gì ?",
   illus:"panneau-interdiction",
   options:[
     {fr:"Ronds à fond blanc, liseré et symbole rouges",vi:"Tròn, nền trắng, viền và ký hiệu đỏ"},
     {fr:"Triangulaires à fond jaune",vi:"Tam giác nền vàng"},
     {fr:"Carrés bleus",vi:"Hình vuông xanh"},
   ],answer:0,
   expFr:"Les panneaux d'interdiction sont ronds, à fond blanc avec un liseré rouge (ex : vitesse max, dépassement interdit).",
   expVi:"Biển cấm hình tròn, nền trắng, viền đỏ (ví dụ: tốc độ tối đa, cấm vượt)."},

  {id:14,theme:"signalisation",
   fr:"Que signifie le marquage 'Stop' peint sur la chaussée ?",
   vi:"Chữ 'Stop' vẽ trên mặt đường có nghĩa gì ?",
   illus:"marquage-stop",
   options:[

  {id:15,theme:"signalisation",

     {fr:"Vitesse maximale autorisée : 50 km/h",vi:"Tốc độ tối đa được phép: 50 km/h"},

   expVi:"Biển cấm này giới hạn tốc độ tối đa được phép là 50 km/h."},

     {fr:"0,8 g/L de sang",vi:"0,8 g/L máu"},
   ],answer:1,

   expVi:"Với lái xe mới và xe máy dưới 50cc, mức tối đa là 0,2 g/L máu."},

     {fr:"Est tolérée pour de petites distances",vi:"Được chấp nhận cho quãng đường ngắn"},
   ],answer:1,
   expFr:"La conduite sous l'empire du cannabis est interdite. Elle multiplie par 1,8 le risque d'accident mortel.",
   expVi:"Lái xe khi dùng cần sa bị cấm. Nó làm tăng 1,8 lần nguy cơ tai nạn chết người."},

  {id:19,theme:"alcool",
   fr:"Le café ou une douche froide permettent-ils d'éliminer l'alcool plus vite ?",
   vi:"Cà phê hay tắm nước lạnh có giúp cơ thể loại bỏ cồn nhanh hơn không ?",

     {fr:"Oui, le café accélère l'élimination",vi:"Có, cà phê giúp loại bỏ nhanh hơn"},

     {fr:"Oui, une douche froide est efficace",vi:"Có, tắm nước lạnh có hiệu quả"},
   ],answer:1,
   expFr:"Seul le temps permet à l'organisme d'éliminer l'alcool. Café, eau, douche froide n'ont aucun effet.",
   expVi:"Chỉ có thời gian mới giúp cơ thể loại bỏ cồn. Cà phê, nước, tắm lạnh đều vô tác dụng."},

  {id:20,theme:"alcool",
   fr:"Conduire sous l'influence de médicaments qui altèrent la vigilance est :",
   vi:"Lái xe khi dùng thuốc ảnh hưởng đến sự tỉnh táo là :",
   illus:"medicaments",
   options:[
     {fr:"Autorisé si le médecin l'a prescrit",vi:"Được phép nếu bác sĩ kê toa"},
     {fr:"Autorisé si on fait attention",vi:"Được phép nếu cẩn thận"},
     {fr:"Interdit et dangereux, même sur prescription",vi:"Bị cấm và nguy hiểm, kể cả khi có đơn thuốc"},
   ],answer:2,
   expFr:"Certains médicaments (ex : somnifères, antihistaminiques) sont signalés par un pictogramme. Leur prise déconseille la conduite.",
   expVi:"Một số thuốc (thuốc ngủ, kháng histamine) có biểu tượng cảnh báo. Không nên lái xe khi dùng."},

  // ── SECURITE ──────────────────────────────────
  {id:21,theme:"securite",
   fr:"Le port du casque est-il obligatoire pour le conducteur d'un 50cc ?",

     {fr:"Seulement sur autoroute",vi:"Chỉ bắt buộc trên đường cao tốc"},

   expFr:"Le casque est obligatoire pour tout conducteur ET passager de deux-roues motorisé, quelle que soit la vitesse ou le lieu.",
   expVi:"Mũ bảo hiểm bắt buộc cho người lái VÀ người ngồi sau trên xe hai bánh có động cơ, bất kể tốc độ hay nơi đâu."},

  {id:22,theme:"securite",
   fr:"Quelle est la distance minimale de sécurité entre deux véhicules à 50 km/h ?",
   vi:"Khoảng cách an toàn tối thiểu giữa hai xe ở tốc độ 50 km/h là bao nhiêu ?",

     {fr:"1 longueur de véhicule",vi:"1 chiều dài xe"},
   ],answer:1,
   expFr:"La distance de sécurité correspond à la distance parcourue en 2 secondes, soit ~28 m à 50 km/h.",
   expVi:"Khoảng cách an toàn tương đương quãng đường đi trong 2 giây, khoảng 28 m ở 50 km/h."},

  {id:23,theme:"securite",
   fr:"Pourquoi doit-on vérifier ses rétroviseurs avant de changer de direction ?",
   vi:"Tại sao phải kiểm tra gương chiếu hậu trước khi đổi hướng ?",

   options:[
     {fr:"Pour respecter le code de la route uniquement",vi:"Chỉ để tuân theo luật giao thông"},
     {fr:"Pour s'assurer qu'aucun véhicule ou cycliste ne se trouve dans l'angle mort",vi:"Để đảm bảo không có xe hay người đi xe đạp trong điểm mù"},
     {fr:"C'est inutile sur les petites routes",vi:"Không cần thiết trên đường nhỏ"},
   ],answer:1,
   expFr:"Les angles morts sont dangereux. Avant tout changement de direction, il faut vérifier rétroviseurs ET faire le tour de tête.",
   expVi:"Điểm mù rất nguy hiểm. Trước khi đổi hướng, cần kiểm tra gương VÀ quay đầu quan sát."},

  {id:24,theme:"securite",

   options:[

     {fr:"Accélérer pour rejoindre le bord rapidement",vi:"Tăng tốc để nhanh vào lề"},

   expVi:"Phanh gấp khi thủng lốp có thể gây ngã. Cần giảm tốc từ từ và dừng an toàn sang lề."},

     {fr:"Ne servent à rien en cas de chute",vi:"Vô tác dụng khi ngã"},
   ],answer:1,
   expFr:"Les gants homologués sont fortement conseillés (protection des mains en cas de chute) mais non obligatoires pour les 50cc.",
   expVi:"Găng tay được chứng nhận rất được khuyến nghị (bảo vệ tay khi ngã) nhưng không bắt buộc với xe 50cc."},

     {fr:"Salir son casque",vi:"Làm bẩn mũ bảo hiểm"},

   expVi:"Vượt xe có nguy cơ va chạm trực diện với xe ngược chiều. Đây là một trong những nguyên nhân tai nạn chết người chủ yếu."},

  {id:27,theme:"securite",

  {id:28,theme:"securite",

  {id:29,theme:"securite",

  {id:30,theme:"securite",

  {id:37,theme:"conduite",

   ],answer:1,
   expFr:"Les genouillères homologuées protègent les articulations lors des chutes, l'une des blessures les plus fréquentes.",
   expVi:"Bảo vệ đầu gối được chứng nhận bảo vệ khớp khi ngã, một trong những chấn thương phổ biến nhất."},

  {id:65,theme:"signalisation",
   fr:"Que signifient les chevrons jaunes peints sur la chaussée (en courbe) ?",
   vi:"Những mũi tên vàng vẽ trên đường (trong đường cua) có nghĩa gì ?",
   illus:"chevrons",
   options:[
     {fr:"Fin de priorité",vi:"Kết thúc ưu tiên"},
     {fr:"Virage dangereux – ralentissez",vi:"Khúc cua nguy hiểm – giảm tốc"},
     {fr:"Sens de circulation obligatoire",vi:"Chiều đi bắt buộc"},
   ],answer:1,
   expFr:"Les chevrons jaunes sur la chaussée signalent un virage dangereux et invitent à réduire la vitesse.",
   expVi:"Mũi tên vàng trên đường báo hiệu khúc cua nguy hiểm và yêu cầu giảm tốc."},

  {id:66,theme:"priorite",
   fr:"Un conducteur doit-il céder le passage à un tram ?",
   vi:"Người lái xe có phải nhường đường cho tàu điện không ?",
   illus:"tramway",
   options:[
     {fr:"Non, le tram doit s'arrêter",vi:"Không, tàu điện phải dừng"},
     {fr:"Oui, le tramway a toujours la priorité sur les voies ferrées",vi:"Có, tàu điện luôn được ưu tiên trên đường ray"},
     {fr:"Seulement aux carrefours avec feux",vi:"Chỉ tại ngã tư có đèn"},
   ],answer:1,
   expFr:"Le tramway doit être laissé passer en priorité, surtout en dehors des carrefours réglementés.",
   expVi:"Tàu điện phải được nhường đường ưu tiên, đặc biệt ngoài các ngã tư có đèn."},

  {id:67,theme:"conduite",
   fr:"Que faut-il faire quand on croise un véhicule en sens inverse la nuit ?",
   vi:"Phải làm gì khi gặp xe ngược chiều vào ban đêm ?",
   illus:"croisement-nuit",
   options:[
     {fr:"Allumer les feux de route pour mieux voir",vi:"Bật đèn pha xa để nhìn rõ hơn"},
     {fr:"Passer aux feux de croisement (codes) pour ne pas éblouir",vi:"Chuyển sang đèn cận để không làm chói mắt"},
     {fr:"Éteindre les feux pour ne pas éblouir",vi:"Tắt đèn để không làm chói"},
   ],answer:1,
   expFr:"Lors d'un croisement, on doit passer en feux de croisement pour éviter d'éblouir le conducteur venant en sens inverse.",
   expVi:"Khi gặp xe ngược chiều, phải chuyển sang đèn cận để tránh làm chói mắt tài xế đối diện."},

  {id:68,theme:"securite",
   fr:"En cas de freinage d'urgence, que se passe-t-il si on bloque la roue avant ?",
   vi:"Khi phanh khẩn cấp, điều gì xảy ra nếu bánh trước bị khóa ?",
   illus:"blocage-roue",
   options:[
     {fr:"Le véhicule s'arrête plus vite",vi:"Xe dừng nhanh hơn"},
     {fr:"Le véhicule risque de chuter ou de glisser sans contrôle",vi:"Xe có thể ngã hoặc trượt mất kiểm soát"},
     {fr:"Rien de particulier",vi:"Không có gì đặc biệt"},
   ],answer:1,
   expFr:"Le blocage de la roue avant enlève toute directivité : le véhicule peut glisser ou tomber. Freiner progressivement.",
   expVi:"Khóa bánh trước mất hoàn toàn điều hướng: xe có thể trượt hoặc ngã. Phanh từ từ."},

  {id:69,theme:"alcool",
   fr:"Peut-on être contrôlé à l'alcool même sans avoir causé d'accident ?",
   vi:"Có thể bị kiểm tra nồng độ cồn ngay cả khi không gây tai nạn không ?",
   illus:"controle-alcool",
   options:[
     {fr:"Non, seulement après un accident",vi:"Không, chỉ sau tai nạn"},
     {fr:"Oui, lors de contrôles routiers aléatoires",vi:"Có, trong các đợt kiểm tra giao thông ngẫu nhiên"},
     {fr:"Seulement la nuit",vi:"Chỉ vào ban đêm"},
   ],answer:1,
   expFr:"Les forces de l'ordre peuvent effectuer des contrôles d'alcoolémie à tout moment, sans raison particulière.",
   expVi:"Lực lượng thực thi pháp luật có thể kiểm tra nồng độ cồn bất cứ lúc nào, không cần lý do cụ thể."},

  {id:70,theme:"signalisation",
   fr:"Que signifie un panneau rectangulaire bleu avec un P blanc ?",
   vi:"Biển hình chữ nhật xanh với chữ P trắng có nghĩa gì ?",
   illus:"parking",
   options:[
     {fr:"Stationnement interdit",vi:"Cấm đỗ xe"},
     {fr:"Aire de stationnement autorisé",vi:"Khu vực được phép đỗ xe"},
     {fr:"Passage pour piétons",vi:"Lối đi bộ"},
   ],answer:1,
   expFr:"Ce panneau d'indication bleu avec un P signale une zone de stationnement autorisé.",
   expVi:"Biển chỉ dẫn xanh với chữ P báo khu vực được phép đỗ xe."},

  {id:71,theme:"conduite",
   fr:"Que faut-il faire avant de se garer le long d'un trottoir ?",
   vi:"Cần làm gì trước khi đỗ xe dọc vỉa hè ?",
   illus:"stationnement",
   options:[
     {fr:"Uniquement regarder dans le rétroviseur droit",vi:"Chỉ nhìn gương phải"},
     {fr:"Signaler, vérifier les rétroviseurs, ralentir progressivement",vi:"Báo hiệu, kiểm tra gương, giảm tốc từ từ"},
     {fr:"Accélérer pour se placer rapidement",vi:"Tăng tốc để vào vị trí nhanh"},
   ],answer:1,
   expFr:"Avant tout stationnement : clignotant → rétros → ralentissement progressif → arrêt en sécurité.",
   expVi:"Trước khi đỗ xe: xi nhan → gương → giảm tốc từ từ → dừng an toàn."},

  {id:72,theme:"securite",
   fr:"Quelle tenue vestimentaire est recommandée pour conduire un 50cc ?",
   vi:"Trang phục nào được khuyến nghị khi lái xe 50cc ?",
   illus:"tenue-conduite",
   options:[
     {fr:"Short et tongs pour être à l'aise",vi:"Quần đùi và dép tông cho thoải mái"},
     {fr:"Vêtements couvrants, chaussures fermées, casque et gants",vi:"Quần áo che phủ, giày kín, mũ bảo hiểm và găng tay"},
     {fr:"N'importe quelle tenue, le casque suffit",vi:"Trang phục bất kỳ, mũ bảo hiểm là đủ"},
   ],answer:1,
   expFr:"Une tenue adaptée (blouson, pantalon résistant, bottes, gants) protège en cas de chute.",
   expVi:"Trang phục phù hợp (áo khoác, quần bền, boots, găng tay) bảo vệ khi ngã."},

  {id:73,theme:"priorite",
   fr:"À une intersection, un véhicule vient de votre gauche sans signalisation. Que faites-vous ?",
   vi:"Tại ngã tư, có xe đến từ bên trái bạn không có biển báo. Bạn làm gì ?",
   illus:"gauche-intersection",
   options:[
     {fr:"Vous freinez et le laissez passer car il est prioritaire",vi:"Bạn phanh và nhường vì xe đó được ưu tiên"},
     {fr:"Vous avez la priorité car il vient de la gauche",vi:"Bạn được ưu tiên vì xe đó đến từ bên trái"},
     {fr:"C'est toujours la police qui gère",vi:"Cảnh sát luôn phụ trách điều này"},
   ],answer:1,
   expFr:"La priorité à droite signifie que vous êtes prioritaire sur les véhicules venant de votre gauche.",
   expVi:"Quy tắc ưu tiên bên phải có nghĩa bạn được ưu tiên so với xe đến từ bên trái bạn."},

  {id:74,theme:"conduite",
   fr:"Qu'est-ce que l'aquaplaning (hydroplanage) ?",
   vi:"Aquaplaning (trượt nước) là gì ?",
   illus:"aquaplaning",
   options:[
     {fr:"Glissement du véhicule sur une couche d'eau, perte d'adhérence",vi:"Xe trượt trên lớp nước, mất độ bám"},
     {fr:"Un sport aquatique",vi:"Một môn thể thao dưới nước"},
     {fr:"La condensation sur le pare-brise",vi:"Hơi nước đọng trên kính chắn gió"},
   ],answer:0,
   expFr:"L'aquaplaning survient quand le pneu ne peut plus évacuer l'eau, créant un film qui fait perdre l'adhérence.",
   expVi:"Aquaplaning xảy ra khi lốp không thể thoát nước, tạo lớp phim làm mất độ bám đường."},

  {id:75,theme:"signalisation",
   fr:"Un panneau vert sur une autoroute indique :",
   vi:"Biển xanh lá trên đường cao tốc cho biết :",
   illus:"panneau-vert",
   options:[
     {fr:"Une route nationale",vi:"Đường quốc lộ"},
     {fr:"Les directions, sorties et services sur autoroute",vi:"Hướng đi, lối ra và dịch vụ trên đường cao tốc"},
     {fr:"Une zone verte écologique",vi:"Khu vực xanh sinh thái"},
   ],answer:1,
   expFr:"Sur autoroute, les panneaux de direction sont verts. Sur route nationale, ils sont bleus.",
   expVi:"Trên đường cao tốc, biển chỉ hướng màu xanh lá. Trên đường quốc lộ, chúng màu xanh lam."},

  {id:76,theme:"alcool",
   fr:"Conduire sous l'influence de stupéfiants est détectable par :",
   vi:"Lái xe dưới ảnh hưởng của ma túy có thể phát hiện bằng :",
   illus:"stupefiants",
   options:[
     {fr:"Uniquement une prise de sang",vi:"Chỉ bằng xét nghiệm máu"},
     {fr:"Test salivaire et/ou prise de sang",vi:"Xét nghiệm nước bọt và/hoặc xét nghiệm máu"},
     {fr:"Le comportement du conducteur uniquement",vi:"Chỉ bằng hành vi của lái xe"},
   ],answer:1,
   expFr:"Les forces de l'ordre utilisent des tests salivaires sur le bord de la route. Une prise de sang peut confirmer.",
   expVi:"Lực lượng thực thi pháp luật dùng xét nghiệm nước bọt bên đường. Xét nghiệm máu có thể xác nhận."},

  {id:77,theme:"conduite",
   fr:"Quelle est la conduite à adopter dans un tunnel ?",
   vi:"Cách lái xe trong hầm là gì ?",
   illus:"tunnel",
   options:[
     {fr:"Éteindre les feux pour économiser la batterie",vi:"Tắt đèn để tiết kiệm pin"},
     {fr:"Allumer les feux de croisement, garder la distance, ne pas s'arrêter",vi:"Bật đèn cận, giữ khoảng cách, không dừng"},
     {fr:"Accélérer pour sortir plus vite",vi:"Tăng tốc để ra nhanh hơn"},
   ],answer:1,
   expFr:"Dans un tunnel : feux allumés, distance de sécurité maintenue, vitesse adaptée, pas d'arrêt sauf urgence.",
   expVi:"Trong hầm: bật đèn, duy trì khoảng cách an toàn, tốc độ phù hợp, không dừng trừ khẩn cấp."},

  {id:78,theme:"securite",
   fr:"Comment réduire le risque d'accident par temps de brouillard ?",
   vi:"Làm thế nào để giảm nguy cơ tai nạn trong thời tiết sương mù ?",
   illus:"brouillard",
   options:[
     {fr:"Allumer les feux de route pour voir plus loin",vi:"Bật đèn pha xa để nhìn xa hơn"},
     {fr:"Allumer les antibrouillards, réduire la vitesse, augmenter les distances",vi:"Bật đèn sương mù, giảm tốc, tăng khoảng cách"},
     {fr:"Klaxonner régulièrement",vi:"Bấm còi thường xuyên"},
   ],answer:1,
   expFr:"Par brouillard : antibrouillards avant et arrière, vitesse réduite, distances très augmentées. Les feux de route éblouissent.",
   expVi:"Khi sương mù: bật đèn sương mù trước và sau, giảm tốc, tăng khoảng cách. Đèn pha xa gây chói."},

  {id:79,theme:"conduite",
   fr:"Sur une route nationale hors agglomération, la vitesse maximale est :",
   vi:"Trên đường quốc lộ ngoài khu dân cư, tốc độ tối đa là :",
   illus:"route-nationale",
   options:[
     {fr:"90 km/h (80 km/h depuis 2018 sur la plupart des routes)",vi:"90 km/h (80 km/h từ 2018 trên hầu hết các đường)"},
     {fr:"110 km/h",vi:"110 km/h"},
     {fr:"130 km/h",vi:"130 km/h"},
   ],answer:0,
   expFr:"Depuis 2018, la vitesse est limitée à 80 km/h sur la majorité des routes à double sens sans séparateur central.",
   expVi:"Từ 2018, tốc độ giới hạn 80 km/h trên hầu hết đường hai chiều không có dải phân cách."},

  {id:80,theme:"signalisation",
   fr:"Un panneau de fin de limitation de vitesse ressemble à :",
   vi:"Biển kết thúc giới hạn tốc độ trông như thế nào ?",
   illus:"fin-limitation",
   options:[
     {fr:"Un rond rouge vide",vi:"Hình tròn đỏ rỗng"},
     {fr:"Un rond blanc barré d'une diagonale grise avec le chiffre barré",vi:"Hình tròn trắng với đường chéo xám và số có gạch ngang"},
     {fr:"Un triangle vert",vi:"Tam giác xanh"},
   ],answer:1,
   expFr:"La fin de limitation de vitesse est indiquée par un panneau circulaire blanc avec le chiffre barré d'une diagonale.",
   expVi:"Kết thúc giới hạn tốc độ được báo bằng biển tròn trắng với số có đường gạch chéo."},

  {id:81,theme:"alcool",
   fr:"Que risque-t-on en conduisant avec un taux d'alcool supérieur à 0,8 g/L ?",
   vi:"Lái xe với nồng độ cồn trên 0,8 g/L có nguy cơ gì ?",
   illus:"sanction-alcool",
   options:[
     {fr:"Un simple avertissement",vi:"Chỉ một cảnh cáo đơn giản"},
     {fr:"Un délit : jusqu'à 2 ans de prison, 4500 € d'amende, retrait de permis",vi:"Vi phạm hình sự: đến 2 năm tù, phạt 4500 €, thu bằng lái"},
     {fr:"Une contravention de 35 €",vi:"Phạt 35 €"},
   ],answer:1,
   expFr:"Au-delà de 0,8 g/L, c'est un délit pénal avec des sanctions très lourdes, même pour un cyclomoteur.",
   expVi:"Trên 0,8 g/L là vi phạm hình sự với hình phạt rất nặng, kể cả với xe 50cc."},

  {id:82,theme:"priorite",
   fr:"Que signifie un feu de signalisation clignotant orange ?",
   vi:"Đèn giao thông vàng nhấp nháy có nghĩa gì ?",
   illus:"feu-clignotant",
   options:[
     {fr:"Passage autorisé sans vigilance particulière",vi:"Được phép đi không cần đặc biệt cẩn thận"},
     {fr:"Intersection à risque : prudence et priorité à droite",vi:"Ngã tư nguy hiểm: cẩn thận và ưu tiên bên phải"},
     {fr:"Feux en panne – interdiction de passer",vi:"Đèn hỏng – cấm đi qua"},
   ],answer:1,
   expFr:"Un feu orange clignotant signale un carrefour dangereux. La priorité à droite s'applique, la prudence est de mise.",
   expVi:"Đèn vàng nhấp nháy báo hiệu ngã tư nguy hiểm. Quy tắc ưu tiên bên phải áp dụng, cần thận trọng."},

  {id:83,theme:"conduite",
   fr:"Que faire lorsqu'on rencontre des animaux sur la route ?",
   vi:"Phải làm gì khi gặp động vật trên đường ?",
   illus:"animaux-route",
   options:[
     {fr:"Freiner brusquement et klaxonner fort",vi:"Phanh gấp và bấm còi to"},
     {fr:"Réduire la vitesse, ne pas tenter de les éviter par une embardée brusque",vi:"Giảm tốc, không cố tránh bằng cách lái bổng"},
     {fr:"Les ignorer et maintenir la vitesse",vi:"Bỏ qua và giữ tốc độ"},
   ],answer:1,
   expFr:"Une embardée brusque pour éviter un animal peut provoquer une perte de contrôle. Freiner progressivement.",
   expVi:"Lái bổng đột ngột để tránh động vật có thể gây mất kiểm soát. Phanh từ từ."},

  {id:84,theme:"securite",
   fr:"Qu'est-ce que le phénomène 'deux roues jamais vu' ?",
   vi:"Hiện tượng 'xe hai bánh không được nhìn thấy' là gì ?",
   illus:"deux-roues-invisible",
   options:[
     {fr:"Les deux-roues sont plus petits et moins visibles pour les automobilistes",vi:"Xe hai bánh nhỏ hơn và khó nhìn thấy hơn với người lái ô tô"},
     {fr:"Les deux-roues circulent la nuit",vi:"Xe hai bánh đi ban đêm"},
     {fr:"Les deux-roues roulent silencieusement",vi:"Xe hai bánh chạy êm"},
   ],answer:0,
   expFr:"Le cyclomotoriste est moins visible car sa silhouette est étroite. Il faut porter des équipements réfléchissants.",
   expVi:"Người đi xe máy ít được nhìn thấy hơn vì bóng hình hẹp. Cần mặc đồ phản quang."},

  {id:85,theme:"conduite",
   fr:"Sur une voie partagée bus + vélos, un cyclomoteur peut-il circuler ?",
   vi:"Trên làn dùng chung xe buýt + xe đạp, xe 50cc có được phép đi không ?",
   illus:"voie-bus",
   options:[
     {fr:"Oui, toujours",vi:"Có, luôn luôn"},
     {fr:"Non, sauf si un panneau l'autorise explicitement",vi:"Không, trừ khi biển báo cho phép rõ ràng"},
     {fr:"Oui, seulement la nuit",vi:"Có, chỉ ban đêm"},
   ],answer:1,
   expFr:"Les cyclomoteurs ne peuvent emprunter les voies bus/vélos que si un panneau le précise explicitement.",
   expVi:"Xe 50cc chỉ được đi trên làn xe buýt/xe đạp khi biển báo cho phép rõ ràng."},

  {id:86,theme:"signalisation",
   fr:"Un panneau rectangulaire marron indique :",
   vi:"Biển hình chữ nhật màu nâu cho biết :",
   illus:"panneau-marron",
   options:[
     {fr:"Une zone industrielle",vi:"Khu công nghiệp"},
     {fr:"Un site touristique ou culturel",vi:"Địa điểm du lịch hoặc văn hóa"},
     {fr:"Un camping",vi:"Khu cắm trại"},
   ],answer:1,
   expFr:"Les panneaux marrons signalent les sites touristiques et culturels (châteaux, musées, parcs naturels…).",
   expVi:"Biển màu nâu chỉ các địa điểm du lịch và văn hóa (lâu đài, bảo tàng, công viên tự nhiên...)."},

  {id:87,theme:"alcool",
   fr:"Parmi ces facteurs, lequel aggrave le plus les effets de l'alcool ?",
   vi:"Trong các yếu tố này, yếu tố nào làm trầm trọng thêm tác dụng của rượu nhất ?",
   illus:"facteurs-alcool",
   options:[
     {fr:"Boire de l'eau entre les verres",vi:"Uống nước giữa các ly"},
     {fr:"Boire à jeun, être fatigué ou prendre des médicaments",vi:"Uống khi đói, mệt mỏi hoặc dùng thuốc"},
     {fr:"Manger des fruits de mer",vi:"Ăn hải sản"},
   ],answer:1,
   expFr:"L'alcool absorbé à jeun passe plus vite dans le sang. La fatigue et les médicaments amplifiaient l'effet.",
   expVi:"Rượu uống khi đói vào máu nhanh hơn. Mệt mỏi và thuốc làm tăng thêm tác dụng."},

  {id:88,theme:"conduite",
   fr:"En conduite de nuit, quand doit-on basculer de l'éclairage route aux codes ?",
   vi:"Khi lái xe ban đêm, khi nào cần chuyển từ đèn pha xa sang đèn cận ?",
   illus:"nuit-codes",
   options:[
     {fr:"Jamais, les feux de route sont toujours préférables",vi:"Không bao giờ, đèn pha xa luôn tốt hơn"},
     {fr:"Dès qu'un véhicule approche en sens inverse ou vous précède",vi:"Ngay khi có xe ngược chiều hoặc xe phía trước"},
     {fr:"Uniquement à l'entrée des villes",vi:"Chỉ khi vào thành phố"},
   ],answer:1,
   expFr:"Les feux de route (plein phare) éblouissent. On passe aux codes dès qu'un véhicule approche en face ou est devant.",
   expVi:"Đèn pha xa gây chói mắt. Chuyển sang đèn cận ngay khi có xe ngược chiều hoặc xe phía trước."},

  {id:89,theme:"securite",
   fr:"Pourquoi les cyclomotoristes sont-ils surreprésentés dans les accidents ?",
   vi:"Tại sao người đi xe máy chiếm tỷ lệ cao trong tai nạn ?",
   illus:"statistiques-accident",
   options:[
     {fr:"Ils roulent trop lentement",vi:"Họ đi quá chậm"},
     {fr:"Moins protégés, moins visibles, et parfois moins expérimentés",vi:"Ít được bảo vệ hơn, ít thấy hơn và đôi khi ít kinh nghiệm hơn"},
     {fr:"Ils n'ont pas de rétroviseurs",vi:"Họ không có gương chiếu hậu"},
   ],answer:1,
   expFr:"Sans carrosserie protectrice, les deux-roues sont très vulnérables. La formation et les EPI réduisent les risques.",

// ════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════
function render() {
  const area = document.getElementById('quizArea');
  const resBox = document.getElementById('resultsBox');

  if (current >= filtered.length) {
    area.innerHTML = '';
    showResults();
    return;
  }
  resBox.classList.remove('visible');

  const q = filtered[current];
  const pct = Math.round((current / filtered.length) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('statTotal').textContent = filtered.length;
  document.getElementById('statGood').textContent = score.good;
  document.getElementById('statWrong').textContent = score.wrong;

  const letters = ['A','B','C'];
  const opts = q.options.map((o, i) => `
    <button class="option" id="opt${i}" onclick="selectOpt(${i})">
      <div class="opt-letter">${letters[i]}</div>
      <div class="opt-text">
        <div class="fr">${o.fr}</div>
        <div class="vi">${o.vi}</div>
      </div>
    </button>`).join('');

  area.innerHTML = `
    <div class="card">
      <div class="card-head">
        <span class="qnum">Question ${current+1} / ${filtered.length}</span>
        <span class="theme-tag">${themeLabel(q.theme)}</span>
      </div>
      <div class="card-body">
        <div class="question-fr">${q.fr}</div>
        <div class="question-vi">${q.vi}</div>
        <div class="illus-wrap">${buildIllus(q.illus)}</div>
        <div class="options">${opts}</div>
        <div class="explanation" id="expBox">
          <div class="exp-fr">✅ ${q.expFr}</div>
          <div class="exp-vi">🇻🇳 ${q.expVi}</div>
        </div>
        <div class="btn-row">
          <button class="btn btn-validate" id="btnValidate" onclick="validate()" disabled>Valider</button>
          <button class="btn btn-primary" id="btnNext" onclick="next()" disabled>Suivant ▶</button>
        </div>
      </div>
    </div>`;
  answered = false;
}

function themeLabel(t) {
  return {priorite:"⛔ Priorité",signalisation:"🚦 Signalisation",alcool:"🍺 Alcool/Drogues",securite:"🪖 Sécurité",conduite:"🛵 Conduite"}[t]||t;
}

let selectedOpt = null;

function selectOpt(i) {
  if (answered) return;
  selectedOpt = i;
  document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
  document.getElementById('opt'+i).classList.add('selected');
  document.getElementById('btnValidate').disabled = false;
}

function validate() {
  if (answered || selectedOpt === null) return;
  answered = true;
  const q = filtered[current];
  document.querySelectorAll('.option').forEach((el, i) => {
    if (i === q.answer) el.classList.add('correct');
    else if (i === selectedOpt) el.classList.add('wrong');
  });
  if (selectedOpt === q.answer) score.good++;
  else score.wrong++;
  document.getElementById('expBox').classList.add('visible');
  document.getElementById('btnValidate').disabled = true;
  document.getElementById('btnNext').disabled = false;
  document.getElementById('statGood').textContent = score.good;
  document.getElementById('statWrong').textContent = score.wrong;
}

function next() {
  current++;
  selectedOpt = null;
  render();
}

function showResults() {
  const total = filtered.length;
  const pct = Math.round((score.good / total) * 100);
  const circle = document.getElementById('scoreCircle');
  circle.style.background = pct >= 70 ? 'linear-gradient(135deg,#16A34A,#15803D)' : pct >= 50 ? 'linear-gradient(135deg,#F5C400,#d97706)' : 'linear-gradient(135deg,#E8003D,#991b1b)';
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('resultTitle').textContent = pct >= 70 ? '🎉 Bravo ! Très bon résultat !' : pct >= 50 ? '📚 Pas mal, continuez à réviser !' : '💪 Continuez vos révisions !';
  document.getElementById('resultMsg').textContent = `${score.good} bonnes réponses sur ${total} – Kết quả: ${score.good}/${total}`;
  document.getElementById('resultsBox').classList.add('visible');
  document.getElementById('progressBar').style.width = '100%';
}

function restart() {
  score = { good:0, wrong:0 };
  current = 0;
  selectedOpt = null;
  filtered = applyFilter(activeFilter);
  shuffleArr(filtered);
  document.getElementById('resultsBox').classList.remove('visible');
  render();
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  score = { good:0, wrong:0 };
  current = 0;
  selectedOpt = null;
  filtered = applyFilter(f);
  shuffleArr(filtered);
  render();
}

function applyFilter(f) {
  return f === 'all' ? [...ALL_QUESTIONS] : ALL_QUESTIONS.filter(q => q.theme === f);
}

function shuffleArr(a) {
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
}

// ── INIT ──
shuffleArr(filtered);
render();
</script>
</body>
</html>
